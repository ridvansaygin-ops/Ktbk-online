<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Köstebek Oyunu - Pro Sürüm</title>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --panel: #16213e; --gold: #f1c40f; --success: #27ae60; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        #game-container { width: 100%; max-width: 700px; background: var(--panel); border-radius: 25px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #1f4068; }

        /* LİDER VE KONUŞMACI PANELİ */
        .status-card {
            background: linear-gradient(145deg, #0f3460, #1a1a2e);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(233, 69, 96, 0.2);
        }

        #speaker-title { font-size: 14px; color: #8892b0; text-transform: uppercase; letter-spacing: 3px; }
        #speaker-name { font-size: 32px; font-weight: bold; color: var(--gold); margin: 15px 0; display: block; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        .timer-display { font-size: 65px; font-weight: 900; color: var(--primary); font-family: 'Courier New', monospace; margin: 10px 0; }

        /* SÖZÜ DEVRET BUTONU - ASLA KAYBOLMAZ */
        .btn-devret {
            width: 100%;
            padding: 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: block !important;
            visibility: visible !important;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
        }
        .btn-devret:hover { background: #2ecc71; transform: translateY(-3px); }

        /* OYLAMA VE PUANLAMA TABLOSU */
        .voting-container { background: rgba(233, 69, 96, 0.1); border-radius: 20px; padding: 20px; border: 2px dashed var(--primary); display: none; margin-top: 20px; }
        .voting-active { display: block !important; }
        #vote-timer { font-size: 35px; color: #ff4d4d; font-weight: bold; text-align: center; }

        .score-table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #0f3460; border-radius: 10px; overflow: hidden; }
        .score-table th, .score-table td { padding: 12px; text-align: center; border-bottom: 1px solid #1f4068; }
        .score-table th { background: var(--primary); color: white; }

        /* FOOTER VE İMZA */
        footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid #1f4068; width: 100%; }
        .signature { color: var(--gold); font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="status-card">
        <div id="speaker-title">Şu An Konuşuyor</div>
        <div id="speaker-name">Oyuncu Seçiliyor...</div>
        
        <div class="timer-display" id="main-timer">00:60</div>
        
        <button id="devret-button" class="btn-devret" onclick="nextSpeakerAction()">SÖZÜ DEVRET</button>
    </div>

    <div id="voting-panel" class="voting-container">
        <div style="text-align: center; font-size: 14px; color: var(--primary);">KÖSTEBEĞİ BULMAK İÇİN KALAN SÜRE</div>
        <div id="vote-timer">60s</div>
        
        <table class="score-table" id="player-score-list">
            <thead>
                <tr>
                    <th>Oyuncu</th>
                    <th>Puan</th>
                    <th>Durum</th>
                </tr>
            </thead>
            <tbody id="player-table-body">
                </tbody>
        </table>
    </div>

    <footer>
        Editör: <span class="signature">Mehmet Rıdvan Saygın</span>
    </footer>
</div>

<script>
    // OYUN VERİLERİ (Genişletilmiş)
    let gameState = {
        players: [
            { id: 1, name: "Oyuncu 1", score: 0, isMole: false },
            { id: 2, name: "Oyuncu 2", score: 0, isMole: false },
            { id: 3, name: "Oyuncu 3", score: 0, isMole: false },
            { id: 4, name: "Oyuncu 4", score: 0, isMole: false }
        ],
        currentIndex: 0,
        timeLeft: 60,
        gameMode: "speaking", // speaking veya voting
        interval: null
    };

    // SİSTEM BAŞLATICI
    function initGame() {
        updatePlayerList();
        renderUI();
        startMasterTimer();
    }

    // ANA ZAMANLAYICI MOTORU (Merkezi Sistem)
    function startMasterTimer() {
        if (gameState.interval) clearInterval(gameState.interval);
        
        gameState.interval = setInterval(() => {
            if (gameState.timeLeft > 0) {
                gameState.timeLeft--;
                syncDisplays();
            } else {
                handlePhaseEnd();
            }
        }, 1000);
    }

    // TÜM EKRANLARI SENKRONİZE EDEN FONKSİYON
    function syncDisplays() {
        const m = Math.floor(gameState.timeLeft / 60);
        const s = gameState.timeLeft % 60;
        const formatted = `0${m}:${s < 10 ? '0' + s : s}`;
        
        // Ana saat
        const mainClock = document.getElementById('main-timer');
        if (mainClock) mainClock.innerText = formatted;

        // Oylama saati (Donma sorunu burada tamamen giderildi)
        const voteClock = document.getElementById('vote-timer');
        if (voteClock) voteClock.innerText = gameState.timeLeft + "s";
    }

    // UI GÜNCELLEME - BUTON VE İSİM KONTROLÜ
    function renderUI() {
        const nameEl = document.getElementById('speaker-name');
        const btn = document.getElementById('devret-button');
        const votePanel = document.getElementById('voting-panel');

        if (nameEl) {
            nameEl.innerText = gameState.players[gameState.currentIndex].name;
        }

        // Butonun görünürlüğünü garantiye al
        if (btn) {
            btn.style.display = (gameState.gameMode === "speaking") ? "block" : "none";
        }

        // Oylama panelini aşamaya göre göster/gizle
        if (votePanel) {
            if (gameState.gameMode === "voting") {
                votePanel.classList.add('voting-active');
            } else {
                votePanel.classList.remove('voting-active');
            }
        }
    }

    // SÖZÜ DEVRET FONKSİYONU
    function nextSpeakerAction() {
        gameState.currentIndex = (gameState.currentIndex + 1) % gameState.players.length;
        gameState.timeLeft = 60; // Süreyi sıfırla
        
        // Eğer tur bittiyse oylamaya geç (Örnek mantık)
        if (gameState.currentIndex === 0) {
            // gameState.gameMode = "voting"; // İsteğe bağlı oylama geçişi
        }

        renderUI();
        startMasterTimer();
    }

    // OYUNCU LİSTESİ VE PUANLARI YÜKLE
    function updatePlayerList() {
        const tbody = document.getElementById('player-table-body');
        if (!tbody) return;
        
        tbody.innerHTML = "";
        gameState.players.forEach(p => {
            const row = `<tr>
                <td>${p.name}</td>
                <td>${p.score}</td>
                <td style="color:var(--gold)">Aktif</td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    function handlePhaseEnd() {
        console.log("Süre bitti, sistem oylamaya veya bir sonraki aşamaya geçiyor.");
        // Oylama ekranını otomatik açmak için:
        // gameState.gameMode = "voting";
        // gameState.timeLeft = 60;
        // renderUI();
    }

    // Başlat
    window.onload = initGame;
</script>

</body>
</html>
