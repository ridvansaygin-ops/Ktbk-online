<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAFİL KÖSTEBEK ONLINE | V6 | M. Rıdvan Saygın</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root { --bg: #000; --panel: #111; --accent: #fff; --red: #ff4d4d; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --gray: #444; --green: #2e7d32; }
        body { background-color: var(--bg); color: var(--accent); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 95%; max-width: 460px; background: var(--panel); border: 2px solid #222; border-radius: 35px; padding: 20px 16px; text-align: center; box-sizing: border-box; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .marquee-rules { background: #0a0a0a; color: var(--gold); padding: 8px 0; font-size: 0.7em; border-radius: 50px; margin-bottom: 15px; overflow: hidden; white-space: nowrap; border: 1px solid #333; }
        .marquee-content { display: inline-block; animation: scroll 30s linear infinite; padding-left: 100%; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        h1 { font-size: 1.5em; margin: 5px 0; letter-spacing: 1px; }
        .author { color: #555; font-size: 0.65em; margin-bottom: 12px; font-weight: bold; }
        input, .btn { width: 100%; padding: 14px; margin: 8px 0; border-radius: 28px; border: none; font-size: 1em; font-weight: bold; box-sizing: border-box; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #333; text-align: center; outline: none; }
        .btn-main { background: var(--accent); color: #000; cursor: pointer; transition: 0.2s; }
        .btn-gafil { background: var(--gold); color: #000; }
        .btn-katil { background: var(--red); color: #fff; }
        .btn-exit { background: #330000; color: #ff8888; border: 1px solid #800; font-size: 0.8em; padding: 8px 12px; margin: 4px 0; }
        .player-card { background: #151515; padding: 12px 15px; margin: 8px 0; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gray); transition: 0.2s; }
        .player-info { display: flex; align-items: center; gap: 8px; font-size: 0.95em; flex-wrap: wrap; }
        .mic-btn { background: var(--gray); border: none; color: white; padding: 5px 12px; border-radius: 30px; font-size: 0.7em; cursor: pointer; font-weight: bold; }
        .mic-on { background: var(--green); }
        .mic-off { background: var(--red); }
        .exit-btn { background: #800; color: white; border: none; border-radius: 20px; padding: 5px 10px; font-size: 0.7em; cursor: pointer; margin-left: 5px; }
        .rank-0 { border-left-color: var(--gold) !important; background: #1f1a00; }
        .rank-1 { border-left-color: var(--silver) !important; }
        .rank-2 { border-left-color: var(--bronze) !important; }
        .hidden { display: none !important; }
        .word-box { background: #0f0f0f; border: 3px dashed #555; padding: 40px 10px; font-size: 2.2em; font-weight: bold; margin: 20px 0; border-radius: 28px; color: var(--gold); letter-spacing: 1px; }
        .vote-item { background: #1a1a1a; padding: 14px; margin: 8px 0; border-radius: 50px; border: 1px solid #333; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .vote-item:active { background: #333; }
        .stats-panel { display: flex; justify-content: space-between; background: #0c0c0c; padding: 6px 12px; border-radius: 50px; margin-top: 12px; font-size: 0.7em; font-weight: bold; color: #aaa; }
        #timer-display { font-size: 2.8em; color: var(--red); font-weight: 800; margin: 10px 0; background: #1a0000; border-radius: 60px; width: 100px; margin-left: auto; margin-right: auto; padding: 10px; }
        .copy-area { display: flex; gap: 8px; align-items: center; background: #0a0a0a; padding: 5px 10px; border-radius: 40px; }
        .copy-area input { flex: 1; background: transparent; border: none; color: var(--gold); font-size: 0.6em; padding: 8px 0; margin: 0; text-align: left; }
        .copy-btn { background: var(--gold); color: #000; border: none; border-radius: 30px; padding: 6px 12px; font-weight: bold; cursor: pointer; font-size: 0.8em; }
        .word-counter { background: #222; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; margin-bottom: 10px; color: var(--gold); }
        .round-settings { background: #1a1a1a; padding: 10px; border-radius: 20px; margin: 10px 0; }
        .waiting-text { color: var(--gold); font-size: 1.2em; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-lobby">
        <div class="marquee-rules">
            <div class="marquee-content">🎧 3-6 oyuncu 1 köstebek, 7-10 oyuncu 2 köstebek. 3 pas olursa köstebek kaçar. Herkes sözü devredebilir. 🎲</div>
        </div>
        <h1>GAFİL KÖSTEBEK <span style="font-size:0.5em; color:var(--gold);">[ONLINE V6]</span></h1>
        <div class="author">M. RIDVAN SAYGIN | SESLİ ODA</div>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="Oyuncu Adı" maxlength="14">
            <button class="btn btn-main" onclick="odaKur()">🎤 ODA KUR (LİDER OL)</button>
        </div>

        <div id="lobby-area" class="hidden">
            <div id="share-info" style="background:#1a1a1a; padding: 10px; border-radius: 20px; margin-bottom: 12px;">
                <p style="font-size:0.7em; margin:2px 0 8px 0; color:var(--gold);">✨ LİNKİ PAYLAŞ ✨</p>
                <div class="copy-area">
                    <input type="text" id="share-link" readonly value="">
                    <button class="copy-btn" onclick="kopyalaLink()">📋 KOPYALA</button>
                </div>
            </div>
            <div id="player-list"></div>
            <div id="host-controls" class="hidden">
                <div class="round-settings">
                    <label style="font-size:0.8em;">📊 KAÇ KELİME OYNANSIN?</label>
                    <select id="roundCountSelect" style="width:100%; padding:10px; margin:8px 0; border-radius:20px; background:#222; color:white; border:1px solid #444;">
                        <option value="3">3 Kelime (Hızlı Oyun)</option>
                        <option value="5" selected>5 Kelime (Normal)</option>
                        <option value="7">7 Kelime (Maraton)</option>
                        <option value="10">10 Kelime (Uzun)</option>
                    </select>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-gafil" onclick="oyunuBaslat('gafil')">🎭 GAFİL MODU</button>
                        <button class="btn btn-katil" onclick="oyunuBaslat('katil')">🔪 KATİL MODU</button>
                    </div>
                </div>
            </div>
            <div class="stats-panel"><span>👥 BAĞLI: <span id="lobby-count">0</span></span><span>📦 HAVUZ: 405</span></div>
        </div>
    </div>

    <div id="screen-reveal" class="hidden">
        <div id="host-reveal-area">
            <h2 id="current-player-name" style="color:var(--gold);">---</h2>
            <div id="word-display" class="word-box hidden">---</div>
            <button id="revealBtn" class="btn btn-main" onclick="handleReveal()">👁️ GÖR</button>
            <button id="changeBtn" class="btn btn-change" onclick="changeWord()">🔄 KELİMEYİ DEĞİŞTİR</button>
            <div id="waiting-message" class="waiting-text hidden">🎭 Lider kelimeyi onaylıyor...</div>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div class="word-counter" id="wordCounter">📖 Kelime 1 / 5</div>
        <h2 id="role-title" style="color:var(--gold);">---</h2>
        <div class="word-box" id="game-word-box">---</div>
        <button class="btn btn-main" id="toggle-word-btn" onclick="toggleGameWord()">🔒 GİZLE</button>
        <div id="host-action" class="hidden" style="margin-top: 15px;">
            <button class="btn btn-gafil" onclick="startDiscussion()">🎙️ TARTIŞMAYI BAŞLAT (30sn)</button>
        </div>
        <div id="discussion-area" class="hidden">
            <div id="speaker-name" style="color:var(--gold); font-size:1.3rem; font-weight:bold;">🎤 ---</div>
            <div id="timer-display">30</div>
            <button id="end-turn-btn" class="btn btn-main" onclick="requestNextSpeaker()" style="background:#2c2c2c;">⏩ SÖZÜ DEVRET</button>
        </div>
        <div id="vote-phase-btn-area" class="hidden" style="margin-top: 15px;">
            <button class="btn btn-red" onclick="goToVotePhase()">🗳️ OYLAMAYA GEÇ</button>
        </div>
        <button class="btn btn-exit" onclick="exitToLobby()" style="margin-top:15px;">🚪 OYUNDAN ÇIK</button>
    </div>

    <div id="screen-vote" class="hidden">
        <div id="voter-title" style="margin-bottom:12px; font-size:1.2rem; color:var(--gold);">---</div>
        <div id="vote-options"></div>
        <button class="btn btn-main" style="background:#2c2c2c; color:#f66;" onclick="submitVote('PAS')">⏸️ PAS GEÇ</button>
        <button class="btn btn-exit" onclick="exitToLobby()" style="margin-top:15px;">🚪 OYUNDAN ÇIK</button>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="result-title">---</h1>
        <div id="result-body" style="padding: 12px; font-size: 1em; line-height: 1.5;"></div>
        <button id="resultNextBtn" class="btn btn-main" onclick="proceedAfterResult()">▶️ DEVAM</button>
        <button class="btn btn-exit" onclick="exitToLobby()" style="margin-top:10px;">🚪 LOBİYE DÖN</button>
    </div>
</div>

<script>
    const kelimeHavuzu = [
        ["Kredi Kartı", "Nakit Para"], ["Metrobüs", "Metro"], ["Gök Kuşağı", "Kuzey Işıkları"], ["Yapay Zeka", "İnsan Beyni"], 
        ["Haluk Bilginer", "Şener Şen"], ["Tavuk Döner", "Et Döner"], ["Klima", "Vantilatör"], ["Türk Kahvesi", "Filtre Kahve"],
        ["Lahmacun", "Pide"], ["Barış Manço", "Cem Karaca"], ["Netflix", "YouTube"], ["Çay", "Kahve"], ["Dondurma", "Sorbe"], ["Hamburger", "Pizza"],
        ["Bisiklet", "Kaykay"], ["Sinema", "Tiyatro"], ["Kitap", "Dergi"], ["Aslan", "Kaplan"]
    ];
    let fullHavuz = kelimeHavuzu;
    let usedWords = JSON.parse(localStorage.getItem('gafil_online_hafiza')) || [];

    let peer, myId, myName, localStream, isHost = false;
    let players = [];
    let connections = {};
    let currentGame = { mode: "", spyNames: [], pair: null, playersSnapshot: [], votes: {}, playerVotes: {}, pasCount: 0, currentVoterIndex: 0, roundOver: false, pendingScores: {}, currentRound: 0, totalRounds: 5, discussionOrder: [] };
    let discussionActive = false, currentSpeakerIdx = 0;
    let gameRevealIndex = 0;
    let kelimePair = null;
    let revealApproved = false;  // Lider kelimeyi onayladı mı?
    let currentGameData = null;   // Oyun verilerini sakla

    async function getMedia() { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }

    function odaKur() {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName || myName.length < 2) { alert("Geçerli isim girin"); return; }
        isHost = true;
        myId = "KST-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        getMedia().then(() => {
            initPeer(myId);
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-area').classList.remove('hidden');
            document.getElementById('host-controls').classList.remove('hidden');
            const link = window.location.href.split('?')[0] + "?join=" + myId;
            document.getElementById('share-link').value = link;
            players = [{ name: myName, score: 0, role: "", word: "", alive: true, mic: true }];
            renderLobby();
        }).catch(e => alert("Mikrofon izni gerekli!"));
    }

    function kopyalaLink() {
        let linkInput = document.getElementById('share-link');
        linkInput.select();
        navigator.clipboard.writeText(linkInput.value);
        alert("✅ Link kopyalandı!");
    }

    function exitToLobby() {
        if(confirm("Oyundan çıkıp lobiye dönmek istediğinize emin misiniz?")) {
            resetToLobby();
        }
    }

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('connection', c => {
            c.on('data', d => handleDataMessage(d, c));
            c.on('close', () => { refreshPlayers(); });
        });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => playAudio(s, "gelen"));
        });
    }

    function handleDataMessage(d, conn) {
        if(d.type === 'join') {
            if(!players.find(p => p.name === d.name)) {
                players.push({ name: d.name, score: 0, role: "", word: "", alive: true, mic: true });
                connections[d.name] = conn;
                broadcast({ type: 'sync', players: players.map(p => ({ name:p.name, score:p.score, alive:p.alive, mic:p.mic })) });
                renderLobby();
                const call = peer.call(conn.peer, localStream);
                call.on('stream', s => playAudio(s, d.name));
            }
        } 
        else if(d.type === 'sync' && !isHost) { players = d.players; renderLobby(); }
        else if(d.type === 'start_game') { currentGameData = d.gameData; startGameFromHost(d.gameData); }
        else if(d.type === 'reveal_approved') { if(!isHost) startRevealForPlayers(); }
        else if(d.type === 'reveal_next') { if(!isHost) showNextPlayerWord(d.index); }
        else if(d.type === 'finish_reveal') { if(!isHost) finishRevealAndStartGame(); }
        else if(d.type === 'vote_submit') { if(isHost) handleVoteSubmission(d.voter, d.target); }
        else if(d.type === 'result_sync') { showResultScreen(d.resultData); }
        else if(d.type === 'next_round') { resetForNextRound(); }
        else if(d.type === 'request_next_speaker') { if(isHost && discussionActive && currentSpeakerIdx < currentGame.discussionOrder.length && currentGame.discussionOrder[currentSpeakerIdx] === d.speakerName) hostNextSpeaker(); }
        else if(d.type === 'disc_start') { if(!isHost) runDiscussionClient(d.idx); }
        else if(d.type === 'force_vote') { if(!isHost) goToVotePhase(); }
    }

    function refreshPlayers() { if(isHost) { broadcast({ type: 'sync', players: players.map(p => ({ name:p.name, score:p.score, alive:p.alive, mic:p.mic })) }); renderLobby(); } }
    
    function renderLobby() {
        const sorted = [...players].sort((a,b) => b.score - a.score);
        const container = document.getElementById('player-list');
        container.innerHTML = sorted.map((p, idx) => {
            let rankClass = idx===0?'rank-0': idx===1?'rank-1': idx===2?'rank-2':'';
            return `<div class="player-card ${rankClass}">
                        <div class="player-info">👤 <b>${p.name}</b> <span style="background:#222; padding:2px 8px; border-radius:40px;">🎯 ${p.score}</span></div>
                        <div>
                            <button class="mic-btn ${p.mic ? 'mic-on' : 'mic-off'}" onclick="toggleMic('${p.name}')">🎙️</button>
                            <button class="exit-btn" onclick="removePlayer('${p.name}')">✖️</button>
                        </div>
                    </div>`;
        }).join('');
        document.getElementById('lobby-count').innerText = players.length;
        if(isHost && players.length>=3) document.getElementById('host-controls').classList.remove('hidden');
        else if(isHost) document.getElementById('host-controls').classList.add('hidden');
    }

    function removePlayer(name) {
        if(isHost && name !== myName) {
            players = players.filter(p => p.name !== name);
            if(connections[name]) { connections[name].close(); delete connections[name]; }
            broadcast({ type: 'sync', players: players.map(p => ({ name:p.name, score:p.score, alive:p.alive, mic:p.mic })) });
            renderLobby();
        } else if(name === myName) {
            resetToLobby();
        }
    }

    function toggleMic(name) { if(myName !== name) return; let p = players.find(x => x.name === name); if(p){ p.mic = !p.mic; if(localStream) localStream.getAudioTracks()[0].enabled = p.mic; } broadcast({ type:'sync', players:players.map(p=>({name:p.name, score:p.score, alive:p.alive, mic:p.mic})) }); renderLobby(); }
    function playAudio(stream, name) { let audio = new Audio(); audio.srcObject = stream; audio.play(); }

    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if(joinId) {
        document.getElementById('setup-area').innerHTML = `<input type="text" id="nameInput" placeholder="Adınızı Yazın"><button class="btn btn-main" onclick="getMedia().then(() => odayaKatil('${joinId}'))">🎧 ODAYA KATIL</button>`;
    }
    function odayaKatil(id) {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName) return;
        peer = new Peer();
        peer.on('open', () => {
            const conn = peer.connect(id);
            conn.on('open', () => { conn.send({ type: 'join', name: myName }); });
            conn.on('data', d => handleDataMessage(d, conn));
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-area').classList.remove('hidden');
        });
        peer.on('call', call => { call.answer(localStream); call.on('stream', s => playAudio(s, "oda")); });
    }

    function broadcast(data) { if(isHost) Object.values(connections).forEach(c => c.send(data)); }

    // Rastgele konuşma sırası oluştur (Katil modunda köstebek ilk konuşamaz)
    function createRandomDiscussionOrder(playersList, mode, spyNames) {
        let playerNames = playersList.map(p => p.name);
        if(mode === 'katil' && spyNames.length > 0) {
            let spies = playerNames.filter(name => spyNames.includes(name));
            let nonSpies = playerNames.filter(name => !spyNames.includes(name));
            for(let i=spies.length - 1; i>0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [spies[i], spies[j]] = [spies[j], spies[i]];
            }
            for(let i=nonSpies.length - 1; i>0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [nonSpies[i], nonSpies[j]] = [nonSpies[j], nonSpies[i]];
            }
            let order = [...nonSpies, ...spies];
            return order;
        } else {
            let order = [...playerNames];
            for(let i=order.length - 1; i>0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [order[i], order[j]] = [order[j], order[i]];
            }
            return order;
        }
    }

    function oyunuBaslat(mode) {
        if(players.length < 3) return;
        let totalRounds = parseInt(document.getElementById('roundCountSelect').value);
        currentGame.totalRounds = totalRounds;
        currentGame.currentRound = 1;
        
        let pairIndex = Math.floor(Math.random() * fullHavuz.length);
        let pair = fullHavuz[pairIndex];
        if(!usedWords.includes(pair[0])) usedWords.push(pair[0]);
        localStorage.setItem('gafil_online_hafiza', JSON.stringify(usedWords));
        
        let mCount = players.length >=7 ? 2 : 1;
        let shuffled = [...players];
        for(let i=shuffled.length - 1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        let spyNames = [];
        for(let i=0;i<mCount;i++) spyNames.push(shuffled[i].name);
        
        let discussionOrder = createRandomDiscussionOrder(players, mode, spyNames);
        
        const gameData = { mode, pair, spyNames, discussionOrder, playersList: players.map(p => ({ name:p.name, score:p.score, alive:true })), currentRound: currentGame.currentRound, totalRounds: currentGame.totalRounds };
        
        broadcast({ type: 'start_game', gameData });
        startGameFromHost(gameData);
    }

    function startGameFromHost(gameData) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-reveal').classList.remove('hidden');
        
        currentGame.mode = gameData.mode;
        currentGame.spyNames = gameData.spyNames;
        currentGame.pair = gameData.pair;
        currentGame.currentRound = gameData.currentRound || 1;
        currentGame.totalRounds = gameData.totalRounds || 5;
        currentGame.discussionOrder = gameData.discussionOrder || [];
        
        currentGame.playersSnapshot = gameData.playersList.map(p => ({ 
            ...p, 
            role: "", 
            word: "", 
            alive: true 
        }));
        
        for(let p of currentGame.playersSnapshot) {
            p.role = currentGame.spyNames.includes(p.name) ? "KÖSTEBEK" : "SİVİL";
            if(p.role === "SİVİL") {
                p.word = gameData.pair[0];
            } else {
                if(gameData.mode === 'katil') {
                    p.word = "???";
                } else {
                    p.word = gameData.pair[1];
                }
            }
        }
        
        currentGame.roundOver = false;
        currentGame.votes = {};
        currentGame.playerVotes = {};
        currentGame.pasCount = 0;
        currentGame.pendingScores = {};
        
        // Lider kendi kelimesini gösterir
        gameRevealIndex = 0;
        revealApproved = false;
        
        if(isHost) {
            // Lider sadece kendi kelimesini görür
            let leaderData = currentGame.playersSnapshot.find(p => p.name === myName);
            document.getElementById('current-player-name').innerText = leaderData.name;
            document.getElementById('word-display').innerText = leaderData.word;
            document.getElementById('word-display').classList.add('hidden');
            document.getElementById('revealBtn').innerText = "GÖR";
            document.getElementById('changeBtn').classList.remove('hidden');
            document.getElementById('waiting-message').classList.add('hidden');
        } else {
            // Diğer oyuncular bekleme modunda
            document.getElementById('current-player-name').innerText = myName;
            document.getElementById('word-display').innerText = "???";
            document.getElementById('word-display').classList.add('hidden');
            document.getElementById('revealBtn').classList.add('hidden');
            document.getElementById('changeBtn').classList.add('hidden');
            document.getElementById('waiting-message').classList.remove('hidden');
        }
    }
    
    function startRevealForPlayers() {
        // Diğer oyunculara kelime gösterme başlar
        gameRevealIndex = 0;
        showNextPlayerWord(0);
    }
    
    function showNextPlayerWord(index) {
        if(index >= currentGame.playersSnapshot.length) {
            broadcast({ type: 'finish_reveal' });
            finishRevealAndStartGame();
            return;
        }
        
        let p = currentGame.playersSnapshot[index];
        if(p.name === myName) {
            // Kendi sırası gelince atla (zaten gördü)
            showNextPlayerWord(index + 1);
            return;
        }
        
        document.getElementById('current-player-name').innerText = p.name;
        document.getElementById('word-display').innerText = p.word;
        document.getElementById('word-display').classList.add('hidden');
        document.getElementById('revealBtn').innerText = "GÖR";
        document.getElementById('revealBtn').classList.remove('hidden');
        document.getElementById('changeBtn').classList.add('hidden');
        document.getElementById('waiting-message').classList.add('hidden');
        
        // Geçici olarak reveal handler'ı değiştir
        window.tempRevealHandler = function() {
            let disp = document.getElementById('word-display');
            if(disp.classList.contains('hidden')) {
                disp.classList.remove('hidden');
                document.getElementById('revealBtn').innerText = "GİZLE";
            } else {
                document.getElementById('revealBtn').classList.add('hidden');
                broadcast({ type: 'reveal_next', index: index + 1 });
                showNextPlayerWord(index + 1);
            }
        };
        document.getElementById('revealBtn').onclick = window.tempRevealHandler;
    }
    
    function handleReveal() {
        if(isHost) {
            let disp = document.getElementById('word-display');
            if(disp.classList.contains('hidden')) {
                disp.classList.remove('hidden');
                document.getElementById('revealBtn').innerText = "GİZLE";
            } else {
                // Lider kelimeyi onayladı
                revealApproved = true;
                document.getElementById('revealBtn').classList.add('hidden');
                document.getElementById('changeBtn').classList.add('hidden');
                document.getElementById('waiting-message').classList.remove('hidden');
                document.getElementById('word-display').classList.add('hidden');
                document.getElementById('current-player-name').innerText = "TÜM OYUNCULAR";
                document.getElementById('word-display').innerText = "Kelime dağıtılıyor...";
                
                broadcast({ type: 'reveal_approved' });
                startRevealForPlayers();
            }
        }
    }
    
    function changeWord() {
        if(isHost && !revealApproved) {
            let newPair = fullHavuz[Math.floor(Math.random() * fullHavuz.length)];
            kelimePair = newPair;
            for(let p of currentGame.playersSnapshot) {
                if(p.role === "SİVİL") p.word = newPair[0];
                else p.word = (currentGame.mode === 'katil') ? "???" : newPair[1];
            }
            // Liderin kendi kelimesini güncelle
            let leaderData = currentGame.playersSnapshot.find(p => p.name === myName);
            document.getElementById('word-display').innerText = leaderData.word;
            document.getElementById('word-display').classList.add('hidden');
            document.getElementById('revealBtn').innerText = "GÖR";
        }
    }
    
    function finishRevealAndStartGame() {
        document.getElementById('screen-reveal').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('wordCounter').innerHTML = `📖 Kelime ${currentGame.currentRound} / ${currentGame.totalRounds}`;
        showGameUI();
    }
    
    function showGameUI() {
        let me = currentGame.playersSnapshot.find(p => p.name === myName);
        let displayWord = me.word;
        document.getElementById('role-title').innerHTML = me.role === "KÖSTEBEK" ? "🔻 KÖSTEBEKSİN!" : "🛡️ SİVİLSİN";
        document.getElementById('game-word-box').innerText = displayWord;
        document.getElementById('game-word-box').classList.remove('hidden');
        document.getElementById('toggle-word-btn').innerText = "GİZLE";
        if(isHost) document.getElementById('host-action').classList.remove('hidden');
        else document.getElementById('host-action').classList.add('hidden');
        document.getElementById('discussion-area').classList.add('hidden');
        document.getElementById('vote-phase-btn-area').classList.add('hidden');
    }
    
    function toggleGameWord() { let wb = document.getElementById('game-word-box'); wb.classList.toggle('hidden'); document.getElementById('toggle-word-btn').innerText = wb.classList.contains('hidden') ? "GÖR" : "GİZLE"; }
    
    function startDiscussion() {
        if(discussionActive) return;
        discussionActive = true;
        currentSpeakerIdx = 0;
        broadcast({ type: 'disc_start', idx: 0 });
        runDiscussion(0);
    }
    
    function runDiscussion(idx) {
        if(idx >= currentGame.discussionOrder.length) {
            discussionActive = false;
            document.getElementById('discussion-area').classList.add('hidden');
            document.getElementById('vote-phase-btn-area').classList.remove('hidden');
            if(isHost) broadcast({ type: 'force_vote' });
            return;
        }
        
        document.getElementById('host-action').classList.add('hidden');
        document.getElementById('discussion-area').classList.remove('hidden');
        let speakerName = currentGame.discussionOrder[idx];
        document.getElementById('speaker-name').innerHTML = "🎤 " + speakerName;
        
        // Sadece konuşan kişi veya lider sözü devredebilir
        if(speakerName === myName || isHost) {
            document.getElementById('end-turn-btn').style.display = "block";
        } else {
            document.getElementById('end-turn-btn').style.display = "none";
        }
        
        let t = 30;
        let timerDiv = document.getElementById('timer-display');
        clearInterval(window.discTimer);
        timerDiv.innerText = t;
        window.discTimer = setInterval(() => { 
            t--; 
            timerDiv.innerText = t; 
            if(t <= 0) { 
                clearInterval(window.discTimer); 
                requestNextSpeaker(); 
            } 
        }, 1000);
    }
    
    function runDiscussionClient(idx) { runDiscussion(idx); }
    
    function requestNextSpeaker() {
        clearInterval(window.discTimer);
        if(isHost) {
            hostNextSpeaker();
        } else {
            let currentSpeaker = currentGame.discussionOrder[currentSpeakerIdx];
            if(currentSpeaker === myName) {
                let conn = Object.values(connections)[0];
                if(conn) conn.send({ type: 'request_next_speaker', speakerName: myName });
            }
        }
    }
    
    function hostNextSpeaker() {
        currentSpeakerIdx++;
        if(currentSpeakerIdx < currentGame.discussionOrder.length) {
            broadcast({ type: 'disc_start', idx: currentSpeakerIdx });
            runDiscussion(currentSpeakerIdx);
        } else {
            discussionActive = false;
            document.getElementById('discussion-area').classList.add('hidden');
            document.getElementById('vote-phase-btn-area').classList.remove('hidden');
            broadcast({ type: 'force_vote' });
        }
    }
    
    function goToVotePhase() { startVotingPhase(); }
    
    function startVotingPhase() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-vote').classList.remove('hidden');
        currentGame.currentVoterIndex = 0;
        currentGame.votes = {};
        currentGame.playerVotes = {};
        currentGame.pasCount = 0;
        renderVoteUI();
    }
    
    function renderVoteUI() {
        let alivePlayers = currentGame.playersSnapshot.filter(p => p.alive);
        if(currentGame.currentVoterIndex >= alivePlayers.length) { calculateResults(); return; }
        let voter = alivePlayers[currentGame.currentVoterIndex];
        document.getElementById('voter-title').innerHTML = `🗳️ SIRA: ${voter.name}`;
        let candidates = alivePlayers.filter(p => p.name !== voter.name);
        document.getElementById('vote-options').innerHTML = candidates.map(p => `<div class="vote-item" onclick="submitVote('${p.name}')">🔸 ${p.name}</div>`).join('');
    }
    
    function submitVote(target) {
        let alive = currentGame.playersSnapshot.filter(p => p.alive);
        let voter = alive[currentGame.currentVoterIndex];
        if(target === 'PAS') { currentGame.pasCount++; currentGame.playerVotes[voter.name] = 'PAS'; }
        else { currentGame.votes[target] = (currentGame.votes[target] || 0) + 1; currentGame.playerVotes[voter.name] = target; }
        if(isHost) { currentGame.currentVoterIndex++; renderVoteUI(); }
        else { let conn = Object.values(connections)[0]; if(conn) conn.send({ type: 'vote_submit', voter: voter.name, target }); }
    }
    
    function handleVoteSubmission(voter, target) { 
        let alive = currentGame.playersSnapshot.filter(p => p.alive); 
        let idx = alive.findIndex(p => p.name === voter); 
        if(idx !== -1 && idx === currentGame.currentVoterIndex) { 
            if(target === 'PAS') currentGame.pasCount++; 
            else currentGame.votes[target] = (currentGame.votes[target] || 0) + 1; 
            currentGame.playerVotes[voter] = target; 
            currentGame.currentVoterIndex++; 
            renderVoteUI(); 
        } 
    }
    
    function calculateResults() {
        let sorted = Object.entries(currentGame.votes).sort((a,b)=>b[1]-a[1]);
        let isDraw = sorted.length > 1 && sorted[0][1] === sorted[1][1];
        let resultText = "", resultTitle = "";
        
        if(currentGame.pasCount >= 3 || isDraw || sorted.length === 0) {
            resultTitle = "💨 KÖSTEBEK KAÇTI!";
            currentGame.spyNames.forEach(spy => { currentGame.pendingScores[spy] = (currentGame.pendingScores[spy] || 0) + 1; });
            resultText = "Oylama geçersiz. Köstebekler +1 puan kazandı.";
        } else {
            let targetName = sorted[0][0];
            let targetPlayer = currentGame.playersSnapshot.find(p => p.name === targetName);
            if(targetPlayer.role === "KÖSTEBEK") {
                resultTitle = "🎯 DOĞRU TAHMİN!";
                targetPlayer.alive = false;
                let bilenler = [];
                for(let p of currentGame.playersSnapshot) {
                    if(p.alive && p.role === "SİVİL" && currentGame.playerVotes[p.name] === targetName) {
                        currentGame.pendingScores[p.name] = (currentGame.pendingScores[p.name] || 0) + 1;
                        bilenler.push(p.name);
                    }
                }
                resultText = `<b>${targetName}</b> köstebekti! ✅ Bilenler: ${bilenler.length?bilenler.join(', '):'Kimse bilemedi'}`;
            } else {
                resultTitle = "❌ YANLIŞ KİŞİ!";
                targetPlayer.alive = false;
                currentGame.spyNames.forEach(spy => { currentGame.pendingScores[spy] = (currentGame.pendingScores[spy] || 0) + 1; });
                resultText = `<b>${targetName}</b> masumdu. Köstebekler +1 puan aldı.`;
            }
        }
        
        for(let k in currentGame.pendingScores) {
            let pIdx = currentGame.playersSnapshot.findIndex(pp=>pp.name===k);
            if(pIdx!==-1) currentGame.playersSnapshot[pIdx].score += currentGame.pendingScores[k];
            let origIdx = players.findIndex(pp=>pp.name===k);
            if(origIdx!==-1) players[origIdx].score += currentGame.pendingScores[k];
        }
        
        let gameEnded = (currentGame.currentRound >= currentGame.totalRounds);
        let resultData = { title: resultTitle, body: resultText, gameEnded, currentRound: currentGame.currentRound, totalRounds: currentGame.totalRounds };
        if(isHost) { broadcast({ type: 'result_sync', resultData }); showResultScreen(resultData); }
        else showResultScreen(resultData);
    }
    
    function showResultScreen(data) {
        document.getElementById('screen-vote').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-title').innerText = data.title;
        let nextInfo = (data.gameEnded) ? "🏆 TÜM TURLAR TAMAMLANDI! 🏆" : `📌 Kelime ${data.currentRound} / ${data.totalRounds} tamamlandı.`;
        document.getElementById('result-body').innerHTML = `<div class="result-highlight">${data.body}</div><div style="margin-top:10px; font-size:0.9em;">${nextInfo}</div>`;
        document.getElementById('resultNextBtn').innerText = data.gameEnded ? "🏆 SONUÇLARI GÖSTER" : "⏩ SONRAKİ KELİME";
        if(data.gameEnded) currentGame.roundOver = true;
    }
    
    function proceedAfterResult() {
        if(currentGame.roundOver) {
            showFinalGameResults();
        } else {
            currentGame.currentRound++;
            oyunuBaslat(currentGame.mode);
        }
    }
    
    function showFinalGameResults() {
        let sorted = [...players].sort((a,b) => b.score - a.score);
        let resultHtml = "<h3>🏆 FİNAL SIRALAMASI 🏆</h3>";
        sorted.forEach((p, idx) => {
            let medal = idx===0?"🥇": idx===1?"🥈": idx===2?"🥉":"📌";
            resultHtml += `<div style="padding:8px; margin:5px 0; background:#1a1a1a; border-radius:15px;">${medal} <b>${p.name}</b> — 🎯 ${p.score} puan</div>`;
        });
        document.getElementById('result-body').innerHTML = resultHtml;
        document.getElementById('result-title').innerText = "🎉 OYUN BİTTİ 🎉";
        document.getElementById('resultNextBtn').innerText = "🏠 LOBİYE DÖN";
        currentGame.roundOver = true;
    }
    
    function resetForNextRound() { oyunuBaslat(currentGame.mode); }
    
    function resetToLobby() { 
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-vote').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-reveal').classList.add('hidden');
        document.getElementById('screen-lobby').classList.remove('hidden');
        renderLobby(); 
        broadcast({ type: 'sync', players: players.map(p=>({name:p.name, score:p.score, alive:true, mic:p.mic})) });
    }
</script>
