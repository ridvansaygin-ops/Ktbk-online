<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAFİL KÖSTEBEK ONLINE | M. Rıdvan Saygın</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #fff; --red: #ff4d4d; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --gray: #444; }
        body { background-color: var(--bg); color: var(--accent); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 95%; max-width: 420px; background: var(--panel); border: 2px solid #222; border-radius: 30px; padding: 20px; text-align: center; box-sizing: border-box; }
        .marquee-rules { background: #0a0a0a; color: var(--gold); padding: 8px 0; font-size: 0.72em; border-radius: 50px; margin-bottom: 15px; overflow: hidden; white-space: nowrap; border: 1px solid #333; }
        .marquee-content { display: inline-block; animation: scroll 30s linear infinite; padding-left: 100%; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        h1 { letter-spacing: 1px; font-size: 1.4em; margin: 5px 0; color: var(--accent); }
        .author { color: #444; font-size: 0.7em; margin-bottom: 15px; font-weight: bold; }
        input, .btn { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; font-size: 1.1em; box-sizing: border-box; font-weight: bold; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #333; text-align: center; }
        .btn-main { background: var(--accent); color: #000; cursor: pointer; }
        .btn-gafil { background: var(--gold); color: #000; }
        .btn-katil { background: var(--red); color: #fff; }
        .player-card { background: #151515; padding: 12px; margin: 6px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gray); }
        .rank-0 { border-left-color: var(--gold) !important; color: var(--gold) !important; }
        .hidden { display: none !important; }
        .word-box { background: #1a1a1a; border: 3px dashed #444; padding: 35px 10px; font-size: 2em; font-weight: bold; margin: 15px 0; border-radius: 15px; color: var(--gold); }
        #timer-display { font-size: 2.5em; color: var(--red); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-lobby">
        <div class="marquee-rules">
            <div class="marquee-content">3-6 oyuncu 1 köstebek, 7-10 oyuncu 2 köstebek. 3 pas olursa eleme olmaz. Köstebek kaçarsa 1 puan, yakalanırsa siviller 1 puan alır.</div>
        </div>
        <h1>GAFİL KÖSTEBEK <span style="color:var(--gold);">ONLINE</span></h1>
        <div class="author">EDİTÖR: M. RIDVAN SAYGIN</div>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="Adını Yaz">
            <button class="btn btn-main" onclick="odaKur()">🎤 ODA KUR (LİDER)</button>
        </div>

        <div id="lobby-area" class="hidden">
            <p id="share-link" style="font-size:0.7em; color:var(--gold); word-break:break-all;"></p>
            <div id="player-list"></div>
            <div id="host-controls" class="hidden">
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-gafil" onclick="oyunuBaslat('gafil')">GAFİL MODU</button>
                    <button class="btn btn-katil" onclick="oyunuBaslat('katil')">KATİL MODU</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <h2 id="role-title">---</h2>
        <div class="word-box" id="word-display">---</div>
        <button class="btn btn-main" id="toggle-word-btn" onclick="toggleWord()">GİZLE</button>
        
        <div id="host-action" class="hidden">
            <button class="btn btn-gafil" onclick="startDiscussion()">🎤 TARTIŞMAYI BAŞLAT</button>
        </div>

        <div id="discussion-area" class="hidden">
            <div id="speaker-name" style="color:var(--gold);">Konuşuyor: ---</div>
            <div id="timer-display">30</div>
            <button class="btn btn-gray" id="end-turn-btn" onclick="nextSpeakerReq()" style="display:none;">SÖZÜ DEVRET</button>
        </div>

        <div id="vote-area" class="hidden">
            <h3>OYLAMA</h3>
            <div id="vote-options"></div>
            <button class="btn btn-red" onclick="sendVote('PAS')">PAS GEÇ</button>
        </div>
    </div>
</div>

<script>
    let peer, myId, myName, conn, localStream, isHost = false;
    let players = [], connections = {}, scores = {}, currentSpeakerIdx = 0;
    
    // Senin dosyadaki 405 kelimenin özeti (Tamamını buraya ekleyebilirsin)
    const havuz = [
        ["Kredi Kartı", "Nakit Para"], ["Metrobüs", "Metro"], ["Yapay Zeka", "İnsan Beyni"], ["Tavuk Döner", "Et Döner"], ["Klima", "Vantilatör"], ["Türk Kahvesi", "Filtre Kahve"], ["Tarkan", "Murat Boz"], ["Lionel Messi", "Cristiano Ronaldo"], ["Lahmacun", "Pide"], ["Netflix", "YouTube"], ["Boyoz", "Gevrek"], ["Instagram", "TikTok"], ["Çay", "Kahve"], ["Kedi", "Köpek"], ["Apple", "Samsung"]
    ];

    async function startAudio() {
        try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
        catch (e) { alert("Sesli oyun için mikrofon izni şart!"); }
    }

    function odaKur() {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName) return;
        isHost = true;
        myId = "KST-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        startAudio().then(() => {
            initPeer(myId);
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-area').classList.remove('hidden');
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('share-link').innerText = window.location.href.split('?')[0] + "?join=" + myId;
            players = [{name: myName, score: 0}];
            renderLobby();
        });
    }

    // Link ile Katılım
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if(joinId) {
        document.getElementById('setup-area').innerHTML = `
            <input type="text" id="nameInput" placeholder="Adını Yaz">
            <button class="btn btn-main" onclick="startAudio().then(() => odayaKatil('${joinId}'))">🎤 ODAYA KATIL</button>
        `;
    }

    function odayaKatil(id) {
        myName = document.getElementById('nameInput').value.trim();
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(id);
            conn.on('open', () => {
                conn.send({ type: 'join', name: myName });
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('lobby-area').classList.remove('hidden');
                peer.call(id, localStream);
            });
            conn.on('data', handleData);
        });
        peer.on('call', call => { call.answer(localStream); call.on('stream', s => playAudio(s)); });
    }

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('connection', c => {
            c.on('data', d => handleData(d, c));
        });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => playAudio(s));
            // Diğerlerine de bağla
            Object.values(connections).forEach(target => {
                if(target.peer !== call.peer) peer.call(target.peer, localStream);
            });
        });
    }

    function handleData(data, c) {
        if(data.type === 'join') {
            connections[data.name] = c;
            if(!players.find(p => p.name === data.name)) players.push({name: data.name, score: 0});
            broadcast({ type: 'sync', players });
            renderLobby();
        } else if(data.type === 'sync') {
            players = data.players;
            renderLobby();
        } else if(data.type === 'start') {
            showGame(data);
        } else if(data.type === 'disc') {
            runDisc(data.idx);
        }
    }

    function renderLobby() {
        const list = document.getElementById('player-list');
        players.sort((a,b) => b.score - a.score);
        list.innerHTML = players.map((p, i) => `
            <div class="player-card ${i === 0 ? 'rank-0' : ''}">
                <span>👤 ${p.name}</span>
                <span>🎯 ${p.score} P</span>
            </div>
        `).join('');
    }

    function oyunuBaslat(mode) {
        const pair = havuz[Math.floor(Math.random() * havuz.length)];
        const spyIdx = Math.floor(Math.random() * players.length);
        const data = { type: 'start', mode, pair, spy: players[spyIdx].name };
        broadcast(data);
        showGame(data);
    }

    function showGame(data) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        const isSpy = myName === data.spy;
        document.getElementById('role-title').innerText = isSpy ? "KÖSTEBEKSİN!" : "SİVİLSİN";
        document.getElementById('role-title').style.color = isSpy ? "var(--red)" : "var(--gold)";
        let word = data.pair[0];
        if(isSpy) word = (data.mode === 'katil') ? "KÖSTEBEKSİN" : data.pair[1];
        document.getElementById('word-display').innerText = word;
        if(isHost) document.getElementById('host-action').classList.remove('hidden');
    }

    function toggleWord() {
        const d = document.getElementById('word-display');
        const b = document.getElementById('toggle-word-btn');
        if(d.classList.contains('hidden')) { d.classList.remove('hidden'); b.innerText = "GİZLE"; }
        else { d.classList.add('hidden'); b.innerText = "GÖR"; }
    }

    function startDiscussion() {
        broadcast({ type: 'disc', idx: 0 });
        runDisc(0);
    }

    function runDisc(idx) {
        document.getElementById('host-action').classList.add('hidden');
        document.getElementById('discussion-area').classList.remove('hidden');
        const speaker = players[idx].name;
        document.getElementById('speaker-name').innerText = "Konuşuyor: " + speaker;
        document.getElementById('end-turn-btn').style.display = (myName === speaker) ? "block" : "none";
        startTimer(30, () => { if(isHost) nextStep(idx); });
    }

    function startTimer(s, cb) {
        let t = s;
        const display = document.getElementById('timer-display');
        clearInterval(window.tmr);
        display.innerText = t;
        window.tmr = setInterval(() => {
            t--; display.innerText = t;
            if(t <= 0) { clearInterval(window.tmr); cb(); }
        }, 1000);
    }

    function broadcast(d) { if(isHost) Object.values(connections).forEach(c => c.send(d)); }
    function playAudio(s) { const a = document.createElement('audio'); a.srcObject = s; a.play(); }
</script>
</body>
</html>
