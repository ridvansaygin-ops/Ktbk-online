<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAFİL KÖSTEBEK ONLINE | V22</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #fff; --red: #ff4d4d; --gold: #ffd700; --gray: #444; --green: #4caf50; }
        body { background-color: var(--bg); color: var(--accent); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 420px; background: var(--panel); border: 2px solid #222; border-radius: 30px; padding: 20px; text-align: center; box-sizing: border-box; }
        .marquee-rules { background: #0a0a0a; color: var(--gold); padding: 8px 0; font-size: 0.72em; border-radius: 50px; margin-bottom: 15px; overflow: hidden; white-space: nowrap; border: 1px solid #333; }
        .marquee-content { display: inline-block; animation: scroll 30s linear infinite; padding-left: 100%; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        h1 { font-size: 1.4em; color: var(--accent); margin: 10px 0; }
        input, .btn { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; font-size: 1.1em; font-weight: bold; box-sizing: border-box; }
        input { background: #1a1a1a; color: #fff; border: 1px solid #333; text-align: center; }
        .btn-main { background: var(--accent); color: #000; cursor: pointer; }
        .btn-gafil { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .player-card { background: #151515; padding: 12px; margin: 6px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gray); }
        .mic-btn { background: var(--gray); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8em; }
        .mic-on { background: var(--green); }
        .mic-off { background: var(--red); }
        .hidden { display: none !important; }
        .word-box { background: #1a1a1a; border: 3px dashed #444; padding: 35px 10px; font-size: 2em; font-weight: bold; margin: 15px 0; border-radius: 15px; color: var(--gold); }
        #timer-display { font-size: 2.8em; color: var(--red); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-lobby">
        <div class="marquee-rules">
            <div class="marquee-content">3-6 oyuncu 1 köstebek, 7-10 oyuncu 2 köstebek. 3 pas olursa eleme olmaz. Köstebek kaçarsa 1 puan, yakalanırsa siviller 1 puan alır.</div>
        </div>
        <h1>GAFİL KÖSTEBEK <span style="color:var(--gold);">ONLINE</span></h1>
        <p style="font-size:0.8em; color:#888;">İsmini yaz. Oda kur, linki arkadaşına gönder.</p>
        
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="Adınızı Yazın">
            <button class="btn btn-main" onclick="odaKur()">🎤 ODA KUR (LİDER)</button>
        </div>

        <div id="lobby-area" class="hidden">
            <div id="share-info" style="background:#222; padding:10px; border-radius:10px; margin-bottom:10px;">
                <p style="font-size:0.65em; margin:0; color:var(--gold);">Arkadaşına gönder:</p>
                <p id="share-link" style="font-size:0.6em; word-break:break-all; margin:5px 0;"></p>
            </div>
            <div id="player-list"></div>
            <div id="host-controls" class="hidden">
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-gafil" onclick="oyunuBaslat('gafil')">GAFİL MODU</button>
                    <button class="btn btn-red" onclick="oyunuBaslat('katil')">KATİL MODU</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <h2 id="role-title">---</h2>
        <div class="word-box" id="word-display">---</div>
        <button class="btn btn-main" id="toggle-word-btn" onclick="togW()">GİZLE</button>
        
        <div id="host-action" class="hidden">
            <button class="btn btn-gafil" onclick="startDiscussion()">🎤 TARTIŞMAYI BAŞLAT (30s)</button>
        </div>

        <div id="discussion-area" class="hidden">
            <div id="speaker-name" style="color:var(--gold); font-size:1.2em;">👤 ---</div>
            <div id="timer-display">30</div>
            <button class="btn btn-main" id="end-turn-btn" onclick="hostNext()" style="display:none; background:var(--gray); color:white;">SÖZÜ DEVRET</button>
        </div>
    </div>
</div>

<script>
    let peer, myId, myName, localStream, isHost = false;
    let players = [], connections = {}, calls = {}, currentSpkIdx = 0;
    const havuz = [["Boyoz", "Gevrek"], ["Çay", "Kahve"], ["Metro", "Tramvay"], ["Messi", "Ronaldo"], ["Döner", "Kebap"]];

    async function getMedia() {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    function odaKur() {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName) return;
        isHost = true;
        myId = "KST-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        getMedia().then(() => {
            initPeer(myId);
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-area').classList.remove('hidden');
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('share-link').innerText = window.location.href.split('?')[0] + "?join=" + myId;
            players = [{name: myName, mic: true}];
            renderLobby();
        });
    }

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') {
                    connections[d.name] = c;
                    players.push({name: d.name, mic: true});
                    broadcast({ type: 'sync', players });
                    renderLobby();
                    // ÖNEMLİ: Lider yeni gelen kişiyi ARAR
                    const call = peer.call(c.peer, localStream);
                    call.on('stream', s => playAudio(s, d.name));
                } else if(d.type === 'next_req') { if(isHost) hostNext(); }
            });
        });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => playAudio(s, "Lider"));
        });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if(joinId) {
        document.getElementById('setup-area').innerHTML = `
            <input type="text" id="nameInput" placeholder="Adınızı Yazın">
            <button class="btn btn-main" onclick="getMedia().then(() => odayaKatil('${joinId}'))">🎤 ODAYA KATIL</button>
        `;
    }

    function odayaKatil(id) {
        myName = document.getElementById('nameInput').value.trim();
        peer = new Peer();
        peer.on('open', (pid) => {
            const c = peer.connect(id);
            c.on('open', () => {
                c.send({ type: 'join', name: myName });
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('lobby-area').classList.remove('hidden');
            });
            c.on('data', d => {
                if(d.type === 'sync') { players = d.players; renderLobby(); }
                if(d.type === 'start') showGame(d);
                if(d.type === 'disc') runDisc(d.idx);
            });
        });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => playAudio(s, "Oda"));
        });
    }

    function playAudio(stream, name) {
        const audio = new Audio();
        audio.srcObject = stream;
        audio.play();
    }

    function renderLobby() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map((p, i) => `
            <div class="player-card">
                <span>👤 ${p.name}</span>
                <button class="mic-btn ${p.mic ? 'mic-on' : 'mic-off'}" onclick="toggleMic('${p.name}')">
                    ${p.mic ? 'MİK: AÇIK' : 'MİK: KAPALI'}
                </button>
            </div>
        `).join('');
    }

    function toggleMic(name) {
        if(myName !== name) return;
        const p = players.find(x => x.name === name);
        p.mic = !p.mic;
        localStream.getAudioTracks()[0].enabled = p.mic;
        if(!isHost) peer.connect(joinId).send({type:'sync', players}); // Basit senkron
        renderLobby();
    }

    function oyunuBaslat(mode) {
        const pair = havuz[Math.floor(Math.random() * havuz.length)];
        const spy = players[Math.floor(Math.random() * players.length)].name;
        const d = { type: 'start', mode, pair, spy };
        broadcast(d); showGame(d);
    }

    function showGame(d) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        const isSpy = myName === d.spy;
        document.getElementById('role-title').innerText = isSpy ? "KÖSTEBEKSİN!" : "SİVİLSİN";
        let word = d.pair[0];
        if(isSpy) word = (d.mode === 'katil') ? "KÖSTEBEKSİN" : d.pair[1];
        document.getElementById('word-display').innerText = word;
        if(isHost) document.getElementById('host-action').classList.remove('hidden');
    }

    function startDiscussion() { currentSpkIdx = 0; broadcast({type:'disc', idx:0}); runDisc(0); }

    function runDisc(idx) {
        document.getElementById('host-action').classList.add('hidden');
        document.getElementById('discussion-area').classList.remove('hidden');
        const speaker = players[idx].name;
        document.getElementById('speaker-name').innerText = "Konuşuyor: " + speaker;
        document.getElementById('end-turn-btn').style.display = (myName === speaker || isHost) ? "block" : "none";
        
        let t = 30;
        const disp = document.getElementById('timer-display');
        clearInterval(window.tmr);
        disp.innerText = t;
        window.tmr = setInterval(() => {
            t--; disp.innerText = t;
            if(t <= 0) { clearInterval(window.tmr); if(isHost) hostNext(); }
        }, 1000);
    }

    function hostNext() {
        currentSpkIdx++;
        if(currentSpkIdx < players.length) {
            broadcast({type:'disc', idx: currentSpkIdx});
            runDisc(currentSpkIdx);
        } else {
            alert("Tartışma bitti, oylamaya geçin!");
        }
    }

    function nextSpeakerReq() { if(isHost) hostNext(); else peer.connect(joinId).send({type:'next_req'}); }
    function togW() { 
        const d = document.getElementById('word-display'); 
        d.classList.toggle('hidden'); 
        document.getElementById('toggle-word-btn').innerText = d.classList.contains('hidden') ? "GÖR" : "GİZLE";
    }
    function broadcast(d) { if(isHost) Object.values(connections).forEach(c => c.send(d)); }
</script>
</body>
</html>
