<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Köstebek Grubu - Pro Edition</title>
    <style>
        /* TÜM GÖRSEL TASARIM VE ANİMASYONLAR */
        :root {
            --primary: #e94560;
            --secondary: #0f3460;
            --bg: #1a1a2e;
            --text: #ffffff;
            --accent: #f1c40f;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #game-wrapper {
            width: 95%;
            max-width: 600px;
            background: var(--secondary);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            border: 1px solid #16213e;
        }

        /* LİDER PANELİ - DÜZELTİLDİ */
        .leader-container {
            background: rgba(15, 52, 96, 0.8);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }

        #speaker-info {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            display: block;
            margin-bottom: 10px;
        }

        .timer-box {
            font-size: 48px;
            font-family: 'Courier New', monospace;
            color: var(--primary);
            margin: 15px 0;
            font-weight: 900;
        }

        /* BUTONLAR - KAYBOLMA SORUNU ÇÖZÜLDÜ */
        .action-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: block !important; /* JS ile gizlenmeyi engeller */
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .action-btn:hover {
            background: #2ecc71;
            transform: translateY(-2px);
        }

        /* OYLAMA ALANI VE TABLOLAR */
        .voting-section {
            margin-top: 25px;
            padding: 15px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 12px;
            border: 1px dashed var(--primary);
        }

        .vote-timer {
            font-size: 24px;
            color: #ff4d4d;
            font-weight: bold;
            text-align: center;
        }

        /* OYUNCU LİSTESİ */
        .player-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .player-card {
            background: #16213e;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #1f4068;
        }

        /* FOOTER - YENİ EDİTÖR İMZASI */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #4e5d78;
            border-top: 1px solid #1f4068;
            padding-top: 15px;
        }

        #editor-tag {
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* DİĞER OYUN EKRANLARI İÇİN GİZLEME */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="active-game-screen">
        <div class="leader-container">
            <span style="font-size: 14px; color: #8892b0;">ŞU AN KONUŞAN</span>
            <div id="speaker-info">Oyuncu Bekleniyor...</div>
            
            <div class="timer-box" id="global-timer">00:60</div>
            
            <button id="transfer-btn" class="action-btn" onclick="transferSpeech()">SÖZÜ DEVRET</button>
        </div>

        <div id="voting-panel" class="voting-section">
            <div style="text-align: center; margin-bottom: 10px;">OYLAMA SÜRESİ</div>
            <div id="voting-timer-display" class="vote-timer">60s</div>
            <div class="player-grid" id="vote-players-list">
                </div>
        </div>
    </div>

    <footer>
        <div id="version-area">Editör: <span id="editor-tag">Mehmet Rıdvan Saygın</span></div>
    </footer>
</div>

<script>
    /* OYUN MOTORU VE MANTIK */
    const GameState = {
        players: ["Oyuncu 1", "Oyuncu 2", "Oyuncu 3", "Oyuncu 4"],
        currentIndex: 0,
        timeLeft: 60,
        isVoting: false,
        timerInterval: null
    };

    // Başlatma
    function init() {
        renderPlayers();
        updateUI();
        startTimer();
    }

    // ZAMANLAYICI - DONMA SORUNU ÇÖZÜLDÜ
    function startTimer() {
        if (GameState.timerInterval) clearInterval(GameState.timerInterval);
        
        GameState.timerInterval = setInterval(() => {
            if (GameState.timeLeft > 0) {
                GameState.timeLeft--;
                syncTimers();
            } else {
                handlePhaseChange();
            }
        }, 1000);
    }

    // Tüm ekranlardaki süreleri senkronize etme
    function syncTimers() {
        const timeStr = GameState.timeLeft < 10 ? `00:0${GameState.timeLeft}` : `00:${GameState.timeLeft}`;
        
        // Ana Konuşma Süresi
        const mainDisplay = document.getElementById('global-timer');
        if (mainDisplay) mainDisplay.innerText = timeStr;

        // Oylama Süresi (Oyun oylamadaysa burası da akar)
        const voteDisplay = document.getElementById('voting-timer-display');
        if (voteDisplay) voteDisplay.innerText = GameState.timeLeft + "s";
    }

    // ARA YÜZ GÜNCELLEME - BUTON KAYBOLMA SORUNU ÇÖZÜLDÜ
    function updateUI() {
        const speakerText = document.getElementById('speaker-info');
        const transferBtn = document.getElementById('transfer-btn');

        if (speakerText) {
            speakerText.innerText = GameState.players[GameState.currentIndex];
        }

        // Butonun görünürlüğünü her state değişiminde tazele
        if (transferBtn) {
            transferBtn.style.display = "block";
            transferBtn.style.visibility = "visible";
        }
    }

    // SÖZÜ DEVRET BUTONU
    function transferSpeech() {
        GameState.currentIndex = (GameState.currentIndex + 1) % GameState.players.length;
        GameState.timeLeft = 60; // Süreyi yenile
        
        updateUI();
        startTimer(); // Zamanlayıcıyı tekrar başlat/resetle
        console.log("Sıra değişti: " + GameState.players[GameState.currentIndex]);
    }

    // OYUNCULARI LİSTELE (Oylama Alanı İçin)
    function renderPlayers() {
        const list = document.getElementById('vote-players-list');
        if (!list) return;
        
        list.innerHTML = "";
        GameState.players.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerText = p;
            list.appendChild(card);
        });
    }

    function handlePhaseChange() {
        console.log("Süre doldu, aşama değişiyor.");
        // Orijinal koddaki oylama tetikleyicileri buraya gelir
    }

    // Sayfa Yükleme
    window.onload = init;
</script>

</body>
</html>
