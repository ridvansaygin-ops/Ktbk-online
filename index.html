<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KÖSTEBEK ONLINE | V26 STABİL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #fff; --red: #ff4d4d; --gold: #ffd700; --gray: #222; }
        body { background-color: var(--bg); color: var(--accent); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { width: 100%; max-width: 420px; background: var(--panel); border: 2px solid #222; border-radius: 30px; padding: 20px; box-sizing: border-box; margin: auto; }
        #player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .p-box { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; font-size: 0.9em; }
        .p-active { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .btn { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-gafil { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: white; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; text-align: center; box-sizing: border-box; }
        .hidden { display: none !important; }
        .word-box { background: #1a1a1a; border: 2px dashed #444; padding: 25px; font-size: 1.8em; font-weight: bold; margin: 15px 0; border-radius: 15px; color: var(--gold); }
        #timer-display { font-size: 3em; color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-lobby">
        <h1>KÖSTEBEK <span style="color:var(--gold);">ONLINE</span></h1>
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="Adını Yaz">
            <button class="btn btn-main" onclick="startApp(true)">🎤 ODA KUR</button>
        </div>
        <div id="lobby-content" class="hidden">
            <p id="share-link" style="font-size:0.6em; color:var(--gold); word-break:break-all;"></p>
            <div id="player-list"></div>
            <div id="host-controls" class="hidden">
                <button class="btn btn-gafil" onclick="sendStart('gafil')">GAFİL MODU</button>
                <button class="btn btn-red" onclick="sendStart('katil')">KATİL MODU</button>
            </div>
            <p id="wait-msg">Liderin başlatması bekleniyor...</p>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <h2 id="role-title">ROLÜN</h2>
        <div class="word-box" id="word-display">---</div>
        <button class="btn btn-gray" onclick="toggleW()" style="background:#333; color:white; height:40px; padding:0;">GİZLE / GÖSTER</button>
        <div id="discussion-area" class="hidden" style="margin-top:20px;">
            <div id="timer-display">30</div>
            <button class="btn btn-main" id="pass-btn" onclick="requestNext()" style="display:none;">SÖZÜ DEVRET</button>
        </div>
        <div id="vote-area" class="hidden">
            <h3>OYLAMA ZAMANI</h3>
            <div id="vote-btns"></div>
        </div>
    </div>
</div>

<script>
    let peer, myId, myName, localStream, isHost = false, joinId;
    let players = [], connections = {}, remoteAudios = {};
    let currentIdx = 0, gameTimer;

    const testWords = [["Boyoz", "Gevrek"], ["Çay", "Kahve"], ["Messi", "Ronaldo"], ["Döner", "Kebap"]];

    const urlP = new URLSearchParams(window.location.search);
    joinId = urlP.get('join');
    if(joinId) { document.getElementById('setup-area').innerHTML = `<input type="text" id="nameInput" placeholder="Adını Yaz"><button class="btn btn-gafil" onclick="startApp(false)">🎤 ODAYA KATIL</button>`; }

    async function startApp(host) {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName) return alert("İsim gir!");
        isHost = host;
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Lider sabit ID kullanırsa bağlantı daha stabil olur
        const customId = host ? "KST-" + Math.random().toString(36).substr(2, 5).toUpperCase() : undefined;
        peer = new Peer(customId);
        
        peer.on('open', (id) => {
            myId = id;
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-content').classList.remove('hidden');
            if(isHost) {
                document.getElementById('host-controls').classList.remove('hidden');
                document.getElementById('wait-msg').classList.add('hidden');
                document.getElementById('share-link').innerText = window.location.href.split('?')[0] + "?join=" + id;
                players = [{name: myName, id: myId}];
                renderPlayers();
            } else {
                const conn = peer.connect(joinId);
                setupConn(conn);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                const audio = new Audio(); audio.srcObject = stream; audio.play();
                remoteAudios[call.peer] = audio;
            });
        });

        if(isHost) peer.on('connection', c => setupConn(c));
    }

    function setupConn(conn) {
        connections[conn.peer] = conn;
        conn.on('data', d => {
            if(d.type === 'join' && isHost) {
                players.push({name: d.name, id: d.id});
                broadcast({type: 'sync', players});
                renderPlayers();
                players.forEach(p => { if(p.id !== myId) peer.call(p.id, localStream); });
            }
            if(d.type === 'sync') { players = d.players; renderPlayers(); }
            if(d.type === 'start') showGame(d);
            if(d.type === 'turn') runTurn(d.idx);
            if(d.type === 'next_req' && isHost) nextTurn();
            if(d.type === 'vote') { clearInterval(gameTimer); document.getElementById('discussion-area').classList.add('hidden'); document.getElementById('vote-area').classList.remove('hidden'); renderVotes(); }
        });
    }

    function renderPlayers() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map(p => `<div class="p-box" id="box-${p.id}">👤 ${p.name}</div>`).join('');
    }

    function sendStart(mode) {
        const pair = testWords[Math.floor(Math.random() * testWords.length)];
        const spy = players[Math.floor(Math.random() * players.length)].name;
        const data = {type: 'start', mode, pair, spy};
        broadcast(data); showGame(data);
    }

    function showGame(d) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        const isSpy = myName === d.spy;
        document.getElementById('role-title').innerText = isSpy ? "KÖSTEBEKSİN" : "SİVİLSİN";
        document.getElementById('word-display').innerText = isSpy ? (d.mode === 'katil' ? "KATİL" : d.pair[1]) : d.pair[0];
        if(isHost) setTimeout(() => { currentIdx = 0; broadcast({type: 'turn', idx: 0}); runTurn(0); }, 4000);
    }

    function runTurn(idx) {
        currentIdx = idx;
        document.getElementById('discussion-area').classList.remove('hidden');
        players.forEach(p => document.getElementById(`box-${p.id}`)?.classList.remove('p-active'));
        const speaker = players[idx];
        document.getElementById(`box-${speaker.id}`)?.classList.add('p-active');
        document.getElementById('pass-btn').style.display = (myId === speaker.id) ? "block" : "none";

        // WEPLAY MANTIĞI: Sadece sırası gelenin sesini aç
        Object.keys(remoteAudios).forEach(pid => {
            remoteAudios[pid].muted = (pid !== speaker.id && speaker.id !== myId);
        });

        let t = 30;
        const disp = document.getElementById('timer-display');
        clearInterval(gameTimer);
        disp.innerText = t;
        gameTimer = setInterval(() => {
            t--; disp.innerText = t;
            if(t <= 0) { clearInterval(gameTimer); if(isHost) nextTurn(); }
        }, 1000);
    }

    function requestNext() { if(isHost) nextTurn(); else connections[joinId].send({type: 'next_req'}); }

    function nextTurn() {
        currentIdx++;
        if(currentIdx < players.length) { broadcast({type: 'turn', idx: currentIdx}); runTurn(currentIdx); }
        else { broadcast({type: 'vote'}); showVotingUI(); }
    }

    function showVotingUI() {
        document.getElementById('discussion-area').classList.add('hidden');
        document.getElementById('vote-area').classList.remove('hidden');
        Object.values(remoteAudios).forEach(a => a.muted = false); // Oylamada sesleri aç
        renderVotes();
    }

    function renderVotes() {
        const vDiv = document.getElementById('vote-btns');
        vDiv.innerHTML = players.map(p => `<button class="btn btn-gafil" onclick="this.disabled=true;">${p.name}</button>`).join('') + `<button class="btn btn-red">PAS</button>`;
    }

    function broadcast(d) { Object.values(connections).forEach(c => c.send(d)); }
    function toggleW() { document.getElementById('word-display').classList.toggle('hidden'); }
</script>
</body>
</html>
