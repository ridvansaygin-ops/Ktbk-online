<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAFİL KÖSTEBEK ONLINE | V23</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #fff; --red: #ff4d4d; --gold: #ffd700; --gray: #252525; --green: #4caf50; }
        body { background-color: var(--bg); color: var(--accent); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { width: 100%; max-width: 420px; background: var(--panel); border: 2px solid #222; border-radius: 30px; padding: 20px; box-sizing: border-box; margin: auto; }
        
        /* Sabit Mikrofon Paneli */
        #global-mic-panel { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .mini-mic-btn { font-size: 0.65em; padding: 5px 8px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .m-on { background: var(--green); color: white; }
        .m-off { background: var(--red); color: white; }

        .btn { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-gafil { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: white; }
        .btn-gray { background: var(--gray); color: white; }
        
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; text-align: center; box-sizing: border-box; }
        .hidden { display: none !important; }
        .word-box { background: #1a1a1a; border: 3px dashed #444; padding: 30px 10px; font-size: 2em; font-weight: bold; margin: 15px 0; border-radius: 15px; color: var(--gold); }
        #timer-display { font-size: 3em; color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="global-mic-panel" class="hidden"></div>

    <div id="screen-lobby">
        <h1>GAFİL KÖSTEBEK <span style="color:var(--gold);">ONLINE</span></h1>
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="İsmini Yaz">
            <button class="btn btn-main" onclick="init(true)">🎤 ODA KUR</button>
        </div>
        <div id="lobby-area" class="hidden">
            <p id="share-link" style="font-size:0.6em; color:var(--gold); word-break:break-all;"></p>
            <div id="host-controls" class="hidden">
                <button class="btn btn-gafil" onclick="gameStart('gafil')">GAFİL MODU BAŞLAT</button>
                <button class="btn btn-red" onclick="gameStart('katil')">KATİL MODU BAŞLAT</button>
            </div>
            <p id="wait-msg">Liderin oyunu başlatması bekleniyor...</p>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <h2 id="role-title"></h2>
        <div class="word-box" id="word-display"></div>
        <button class="btn btn-gray" id="toggle-btn" onclick="toggleW()">GİZLE</button>
        
        <hr border="1" style="opacity:0.1; margin:20px 0;">

        <div id="discussion-area" class="hidden">
            <div id="speaker-info" style="font-size:1.2em; color:var(--gold);">👤 ---</div>
            <div id="timer-display">30</div>
            <button class="btn btn-main" id="next-btn" onclick="requestNext()" style="display:none;">SÖZÜ DEVRET</button>
        </div>

        <div id="vote-area" class="hidden">
            <h3>OYLAMA</h3>
            <div id="vote-btns"></div>
        </div>
    </div>
</div>

<script>
    let peer, myId, myName, localStream, isHost = false, joinId;
    let players = [], connections = {}, remoteAudios = {};
    let currentSpkIdx = 0, timer;

    async function init(host, id = null) {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName) return alert("İsim yaz!");
        isHost = host;
        joinId = id;
        
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peer = new Peer(host ? "KST-" + Math.random().toString(36).substr(2, 5).toUpperCase() : undefined);
        
        peer.on('open', (id) => {
            myId = id;
            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('lobby-area').classList.remove('hidden');
            document.getElementById('global-mic-panel').classList.remove('hidden');
            
            if(isHost) {
                document.getElementById('host-controls').classList.remove('hidden');
                document.getElementById('wait-msg').classList.add('hidden');
                document.getElementById('share-link').innerText = window.location.href.split('?')[0] + "?join=" + id;
                players = [{name: myName, id: myId}];
                updateMicPanel();
            } else {
                const conn = peer.connect(joinId);
                conn.on('open', () => {
                    connections[joinId] = conn;
                    conn.send({type: 'join', name: myName, id: myId});
                });
                handleConn(conn);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play();
                remoteAudios[call.peer] = audio;
            });
        });

        if(isHost) {
            peer.on('connection', conn => handleConn(conn));
        }
    }

    function handleConn(conn) {
        conn.on('data', d => {
            if(d.type === 'join' && isHost) {
                players.push({name: d.name, id: d.id});
                broadcast({type: 'sync', players});
                updateMicPanel();
                players.forEach(p => { if(p.id !== myId) peer.call(p.id, localStream); });
            }
            if(d.type === 'sync') { players = d.players; updateMicPanel(); }
            if(d.type === 'start') showGame(d);
            if(d.type === 'disc') runDisc(d.idx);
            if(d.type === 'next' && isHost) hostNext();
        });
    }

    function updateMicPanel() {
        const panel = document.getElementById('global-mic-panel');
        panel.innerHTML = players.map(p => `
            <button class="mini-mic-btn m-on" id="mic-${p.id}" onclick="toggleRemote('${p.id}')">
                ${p.name === myName ? "BEN 🎤" : p.name}
            </button>
        `).join('');
    }

    function toggleRemote(pid) {
        const btn = document.getElementById(`mic-${pid}`);
        if(pid === myId) {
            localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            btn.className = localStream.getAudioTracks()[0].enabled ? "mini-mic-btn m-on" : "mini-mic-btn m-off";
        } else if(remoteAudios[pid]) {
            remoteAudios[pid].muted = !remoteAudios[pid].muted;
            btn.className = remoteAudios[pid].muted ? "mini-mic-btn m-off" : "mini-mic-btn m-on";
        }
    }

    function gameStart(mode) {
        const havuz = [["Boyoz", "Gevrek"], ["Çay", "Kahve"], ["Messi", "Ronaldo"], ["Nakit", "Kredi Kartı"]];
        const pair = havuz[Math.floor(Math.random() * havuz.length)];
        const spy = players[Math.floor(Math.random() * players.length)].name;
        broadcast({type: 'start', mode, pair, spy});
        showGame({mode, pair, spy});
    }

    function showGame(d) {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        const isSpy = myName === d.spy;
        document.getElementById('role-title').innerText = isSpy ? "KÖSTEBEKSİN" : "SİVİLSİN";
        document.getElementById('word-display').innerText = isSpy ? (d.mode==='katil' ? "KATİL": d.pair[1]) : d.pair[0];
        if(isHost) setTimeout(() => { broadcast({type:'disc', idx:0}); runDisc(0); }, 3000);
    }

    function runDisc(idx) {
        currentSpkIdx = idx;
        document.getElementById('discussion-area').classList.remove('hidden');
        const speaker = players[idx];
        document.getElementById('speaker-info').innerText = "Konuşuyor: " + speaker.name;
        document.getElementById('next-btn').style.display = (myName === speaker.name) ? "block" : "none";
        
        let timeLeft = 30;
        const disp = document.getElementById('timer-display');
        clearInterval(timer);
        disp.innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; disp.innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timer); if(isHost) hostNext(); }
        }, 1000);
    }

    function requestNext() {
        if(isHost) hostNext(); 
        else connections[joinId].send({type: 'next'});
    }

    function hostNext() {
        currentSpkIdx++;
        if(currentSpkIdx < players.length) {
            broadcast({type:'disc', idx: currentSpkIdx});
            runDisc(currentSpkIdx);
        } else {
            broadcast({type: 'vote_time'});
            showVoteUI();
        }
    }

    function showVoteUI() {
        clearInterval(timer);
        document.getElementById('discussion-area').classList.add('hidden');
        document.getElementById('vote-area').classList.remove('hidden');
        const vArea = document.getElementById('vote-btns');
        vArea.innerHTML = players.map(p => `<button class="btn btn-gray" onclick="alert('Oy Verildi')">${p.name}</button>`).join('') + `<button class="btn btn-red">PAS</button>`;
    }

    function broadcast(d) { Object.values(connections).forEach(c => c.send(d)); }
    function toggleW() { const w = document.getElementById('word-display'); w.classList.toggle('hidden'); }

    // Link Kontrol
    const urlP = new URLSearchParams(window.location.search);
    const jId = urlP.get('join');
    if(jId) {
        document.getElementById('setup-area').innerHTML = `
            <input type="text" id="nameInput" placeholder="İsmini Yaz">
            <button class="btn btn-main" onclick="init(false, '${jId}')">🎤 ODAYA KATIL</button>
        `;
    }
</script>
</body>
</html>
