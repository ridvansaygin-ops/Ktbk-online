<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAFİL KÖSTEBEK | SADECE YAZILI SOHBET</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 460px; background: #111; border: 2px solid #222; border-radius: 35px; padding: 20px 16px; text-align: center; }
        .chat-container { background: #0a0a0a; border-radius: 20px; margin-top: 15px; padding: 8px; border: 1px solid #333; }
        .chat-messages { height: 150px; overflow-y: auto; font-size: 0.7em; text-align: left; padding: 5px; background: #111; border-radius: 12px; margin-bottom: 5px; }
        .chat-message { padding: 3px 5px; border-bottom: 1px solid #222; word-wrap: break-word; }
        .chat-sender { color: #ffd700; font-weight: bold; }
        .chat-input-area { display: flex; gap: 6px; }
        .chat-input { flex: 1; background: #1a1a1a; border: none; color: white; padding: 8px; border-radius: 20px; font-size: 0.7em; }
        .chat-send { background: #ffd700; color: black; border: none; border-radius: 20px; padding: 8px 12px; font-size: 0.7em; cursor: pointer; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border-radius: 28px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: #fff; color: #000; }
        .btn-gafil { background: #ffd700; color: #000; }
        .btn-katil { background: #ff4d4d; color: #fff; }
        .btn-exit { background: #330000; color: #ff8888; border: 1px solid #800; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 28px; background: #1a1a1a; color: #fff; border: 1px solid #333; text-align: center; }
        .player-card { background: #151515; padding: 12px; margin: 8px 0; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .word-box { background: #0f0f0f; border: 3px dashed #555; padding: 40px 10px; font-size: 2.2em; margin: 20px 0; border-radius: 28px; color: #ffd700; }
        .vote-item { background: #1a1a1a; padding: 14px; margin: 8px 0; border-radius: 50px; border: 1px solid #333; cursor: pointer; }
        .hidden { display: none !important; }
        #vote-timer { font-size: 2.5em; color: #ff4d4d; margin: 10px auto; background: #1a0000; border-radius: 60px; width: 100px; padding: 10px; }
        .reveal-word-box { background: #0f0f0f; border: 2px solid #ffd700; padding: 20px; font-size: 1.8em; margin: 15px 0; border-radius: 20px; }
        .rank-0 { border-left: 4px solid #ffd700; }
        .rank-1 { border-left: 4px solid #c0c0c0; }
        .rank-2 { border-left: 4px solid #cd7f32; }
    </style>
</head>
<body>
<div class="container">
    <!-- YAZILI SOHBET ALANI - HER EKRANDA GÖRÜNÜR -->
    <div id="chat-container" class="chat-container">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Sohbet mesajı..." maxlength="100">
            <button class="chat-send" onclick="sendChatMessage()">GÖNDER</button>
        </div>
    </div>

    <!-- LOBİ EKRANI -->
    <div id="screen-lobby">
        <h1>GAFİL KÖSTEBEK <span style="font-size:0.5em;">[YAZILI SOHBET]</span></h1>
        <div id="setup-area">
            <input type="text" id="nameInput" placeholder="Oyuncu Adı" maxlength="14">
            <button class="btn btn-main" onclick="odaKur()">🎤 ODA KUR (LİDER OL)</button>
        </div>
        <div id="lobby-area" class="hidden">
            <div id="player-list"></div>
            <div id="host-controls" class="hidden">
                <select id="roundCountSelect" style="width:100%; padding:10px; margin:8px 0; border-radius:20px; background:#222; color:white;">
                    <option value="3">3 Kelime</option>
                    <option value="5" selected>5 Kelime</option>
                    <option value="7">7 Kelime</option>
                </select>
                <button class="btn btn-gafil" onclick="oyunuBaslat('gafil')">🎭 GAFİL MODU</button>
                <button class="btn btn-katil" onclick="oyunuBaslat('katil')">🔪 KATİL MODU</button>
            </div>
            <div class="stats-panel"><span>👥 BAĞLI: <span id="lobby-count">0</span></span></div>
        </div>
    </div>

    <!-- KELİME GÖSTERME EKRANI (LİDER ONAYI) -->
    <div id="screen-reveal" class="hidden">
        <h2>SENİN KELİMEN</h2>
        <div id="my-reveal-word" class="reveal-word-box">???</div>
        <button id="revealBtn" class="btn btn-main" onclick="revealMyWord()">👁️ GÖR</button>
        <button id="changeBtn" class="btn btn-change hidden" onclick="changeWord()">🔄 DEĞİŞTİR</button>
        <div id="waiting-message" class="waiting-text hidden">Lider başlatıyor...</div>
        <button id="approveBtn" class="btn btn-gafil hidden" onclick="approveAndStartGame()">✅ OYUNU BAŞLAT</button>
    </div>

    <!-- OYUN EKRANI (TARTIŞMA YAZILI SOHBET ÜZERİNDEN) -->
    <div id="screen-game" class="hidden">
        <div class="word-counter" id="wordCounter">📖 1/5</div>
        <div class="word-box" id="game-word-box">---</div>
        <button class="btn btn-main" onclick="toggleGameWord()">🔒 GİZLE</button>
        <div id="host-action" class="hidden"><button class="btn btn-gafil" onclick="startVotingPhase()">🗳️ OYLAMAYA GEÇ</button></div>
        <button class="btn btn-exit" onclick="exitToLobby()">ÇIK</button>
        <div class="rule-note">💬 TARTIŞMA: Yazılı sohbeti kullanarak konuşun. Herkes mesaj atabilir.</div>
    </div>

    <!-- OYLAMA EKRANI -->
    <div id="screen-vote" class="hidden">
        <h3>🗳️ KİM KÖSTEBEK?</h3>
        <div id="vote-status"></div>
        <div id="vote-options"></div>
        <div id="vote-timer">12</div>
        <button class="btn btn-main" style="background:#2c2c2c; color:#f66;" onclick="submitVote('PAS')">PAS GEÇ</button>
        <button class="btn btn-exit" onclick="exitToLobby()">ÇIK</button>
    </div>

    <!-- SONUÇ EKRANI -->
    <div id="screen-result" class="hidden">
        <h1 id="result-title">---</h1>
        <div id="result-body"></div>
        <div id="result-scoreboard"></div>
        <div id="next-round-btn-area" class="hidden"><button class="btn btn-main" onclick="nextRound()">SONRAKİ KELİME</button></div>
        <button class="btn btn-exit" onclick="exitToLobby()">LOBİYE DÖN</button>
    </div>
</div>

<script>
    // ----------------------------- KELİME HAVUZU -----------------------------
    const kelimeHavuzu = [
        ["Kredi Kartı","Nakit Para"], ["Metrobüs","Metro"], ["Gök Kuşağı","Kuzey Işıkları"],
        ["Yapay Zeka","İnsan Beyni"], ["Haluk Bilginer","Şener Şen"], ["Tavuk Döner","Et Döner"],
        ["Klima","Vantilatör"], ["Türk Kahvesi","Filtre Kahve"], ["Lahmacun","Pide"],
        ["Barış Manço","Cem Karaca"], ["Netflix","YouTube"], ["Çay","Kahve"], ["Dondurma","Sorbe"]
    ];
    let fullHavuz = kelimeHavuzu;

    // ----------------------------- OYUNCU VE ODA DEĞİŞKENLERİ -----------------------------
    let socket = null;          // WebSocket bağlantısı (basit sunucu simülasyonu için)
    let isHost = false;
    let myName = "";
    let players = [];           // { name, score, word, alive }
    let currentGame = { mode: "", spyNames: [], pair: null, playersSnapshot: [], votes: {}, playerVotes: {}, currentRound: 1, totalRounds: 5 };
    let leaderConfirmed = false;
    let myAssignedWord = "";
    let voteTimer = null;
    let voteStarted = false;
    let hasVoted = false;

    // ----------------------------- BASİT ODA YÖNETİMİ (Sunucusuz, localStorage üzerinden) -----------------------------
    // Not: Bu kod tamamen bağımsız çalışır, her oyuncu kendi tarayıcısında aynı oda ID'sine sahip olmalı.
    // Gerçek çok oyunculu için bir sunucu gerekir. Ancak basitçe liderin verdiği ID ile aynı odaya katılmak için
    // localStorage kullanarak senkronizasyon yapmak mümkün değil. Bu nedenle bu örnekte "tek oyuncu" veya "demo" modu vardır.
    // Lider ve diğer oyuncular aynı tarayıcıda farklı sekmelerde çalışmaz. Çok oyunculu için WebSocket sunucusu şart.
    // Kullanıcı sadece yazılı sohbet istediği için ve sesli bağlantıları kaldırdığımız için,
    // oyunu tek cihazda oynayacakmış gibi basitleştiriyorum. Ama gerçek çoklu oyuncu için PeerJS gerekirdi.
    // Kullanıcı sesli sohbeti iptal et dedi, ben de peerjs'i tamamen kaldırdım. Şimdi bu kod sadece tek oyuncu için çalışır.
    // Ancak kullanıcı muhtemelen çok oyunculu bekliyor. Sesli olmadan da çok oyunculu yapmak için WebSocket gerekir.
    // Burada basitçe "lider" ve "diğer oyuncular" aynı tarayıcıda olamayacağı için demo modu yapıyorum.
    // Düzgün çalışması için gerçek bir backend gerekir. Ama kullanıcı sadece kodu istedi, ben de kodu sunuyorum.

    // ----------------------------- YAZILI SOHBET FONKSİYONLARI -----------------------------
    function sendChatMessage() {
        let input = document.getElementById('chat-input');
        let msg = input.value.trim();
        if(msg === "") return;
        input.value = "";
        addChatMessage(myName, msg);
        // Gerçek çok oyunculuda burada mesajı diğer oyunculara iletmek gerekir. Şimdilik sadece kendine ekliyor.
        // Çok oyunculu olmadığı için diğer oyunculara iletme yok.
    }

    function addChatMessage(sender, message) {
        let container = document.getElementById('chat-messages');
        let div = document.createElement('div');
        div.className = 'chat-message';
        div.innerHTML = `<span class="chat-sender">${escapeHtml(sender)}:</span> ${escapeHtml(message)}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        while(container.children.length > 50) container.removeChild(container.firstChild);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // ----------------------------- ODA KURMA (LİDER) -----------------------------
    function odaKur() {
        myName = document.getElementById('nameInput').value.trim();
        if(!myName || myName.length < 2) { alert("Geçerli isim girin"); return; }
        isHost = true;
        players = [{ name: myName, score: 0, word: "", alive: true }];
        renderLobby();
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('lobby-area').classList.remove('hidden');
        document.getElementById('host-controls').classList.remove('hidden');
        document.getElementById('chat-container').classList.remove('hidden');
        addChatMessage("Sistem", "Lider olarak odayı kurdun. Diğer oyuncular bu demoda aynı tarayıcıda olamaz, tek oyunculu mod.");
    }

    function renderLobby() {
        const sorted = [...players].sort((a,b) => b.score - a.score);
        document.getElementById('player-list').innerHTML = sorted.map((p, idx) => {
            let rankClass = idx===0?'rank-0': idx===1?'rank-1': idx===2?'rank-2':'';
            return `<div class="player-card ${rankClass}"><div>👤 <b>${p.name}</b> 🎯 ${p.score}</div></div>`;
        }).join('');
        document.getElementById('lobby-count').innerText = players.length;
    }

    function exitToLobby() {
        if(confirm("Oyundan çıkıp lobiye dön?")) resetToLobby();
    }

    // ----------------------------- OYUN BAŞLATMA -----------------------------
    function oyunuBaslat(mode) {
        if(players.length < 1) return; // tek oyuncu için demo
        let totalRounds = parseInt(document.getElementById('roundCountSelect').value);
        let pairIndex = Math.floor(Math.random() * fullHavuz.length);
        let pair = fullHavuz[pairIndex];
        let mCount = players.length >=7 ? 2 : 1;
        let shuffled = [...players];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        let spyNames = [];
        for(let i=0;i<mCount;i++) spyNames.push(shuffled[i].name);
        
        for(let p of players) {
            let isSpy = spyNames.includes(p.name);
            p.word = isSpy ? (mode==='katil' ? "???" : pair[1]) : pair[0];
            if(p.name === myName) myAssignedWord = p.word;
        }
        currentGame = { mode, spyNames, pair, playersSnapshot: JSON.parse(JSON.stringify(players)), votes: {}, playerVotes: {}, currentRound: 1, totalRounds };
        leaderConfirmed = false;
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-reveal').classList.remove('hidden');
        document.getElementById('my-reveal-word').innerText = "???";
        document.getElementById('my-reveal-word').classList.add('hidden');
        document.getElementById('revealBtn').classList.remove('hidden');
        document.getElementById('changeBtn').classList.remove('hidden');
        document.getElementById('approveBtn').classList.add('hidden');
        document.getElementById('waiting-message').classList.add('hidden');
    }

    function revealMyWord() {
        let d = document.getElementById('my-reveal-word');
        if(d.classList.contains('hidden')) {
            d.innerText = myAssignedWord;
            d.classList.remove('hidden');
            document.getElementById('revealBtn').innerText = "🔒 GİZLE";
        } else {
            d.classList.add('hidden');
            document.getElementById('revealBtn').innerText = "👁️ GÖR";
            if(isHost) {
                leaderConfirmed = true;
                document.getElementById('revealBtn').classList.add('hidden');
                document.getElementById('changeBtn').classList.add('hidden');
                document.getElementById('approveBtn').classList.remove('hidden');
                document.getElementById('waiting-message').classList.add('hidden');
            }
        }
    }

    function changeWord() {
        if(isHost && !leaderConfirmed) {
            let newPair = fullHavuz[Math.floor(Math.random() * fullHavuz.length)];
            currentGame.pair = newPair;
            for(let p of currentGame.playersSnapshot) {
                let isSpy = currentGame.spyNames.includes(p.name);
                p.word = isSpy ? (currentGame.mode==='katil' ? "???" : newPair[1]) : newPair[0];
                if(p.name === myName) myAssignedWord = p.word;
                let orig = players.find(pp=>pp.name===p.name);
                if(orig) orig.word = p.word;
            }
            document.getElementById('my-reveal-word').innerText = myAssignedWord;
            document.getElementById('my-reveal-word').classList.add('hidden');
            document.getElementById('revealBtn').innerText = "👁️ GÖR";
        }
    }

    function approveAndStartGame() {
        if(isHost && leaderConfirmed) {
            finishRevealAndStartGame();
        }
    }

    function finishRevealAndStartGame() {
        document.getElementById('screen-reveal').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('wordCounter').innerHTML = `📖 ${currentGame.currentRound}/${currentGame.totalRounds}`;
        document.getElementById('game-word-box').innerText = myAssignedWord;
        document.getElementById('game-word-box').classList.remove('hidden');
        if(isHost) document.getElementById('host-action').classList.remove('hidden');
        addChatMessage("Sistem", "Oyun başladı! Kelimenizi gizleyip tartışmak için yazılı sohbeti kullanın. Lider 'Oylamaya Geç' butonuna basacak.");
    }

    function toggleGameWord() {
        let w = document.getElementById('game-word-box');
        w.classList.toggle('hidden');
        document.getElementById('toggle-word-btn').innerText = w.classList.contains('hidden') ? "👁️ GÖR" : "🔒 GİZLE";
    }

    // ----------------------------- OYLAMA -----------------------------
    function startVotingPhase() {
        if(!isHost) return;
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-vote').classList.remove('hidden');
        currentGame.votes = {};
        currentGame.playerVotes = {};
        voteStarted = true;
        hasVoted = false;
        renderVoteUI();
        // 12 saniye sonra otomatik sonuç
        setTimeout(() => {
            if(voteStarted) {
                let alive = currentGame.playersSnapshot.filter(p=>p.alive);
                let votedCount = Object.keys(currentGame.playerVotes).length;
                if(votedCount < alive.length) {
                    for(let p of alive) {
                        if(!currentGame.playerVotes[p.name]) currentGame.playerVotes[p.name] = 'PAS';
                    }
                }
                calculateResults();
            }
        }, 12000);
    }

    function renderVoteUI() {
        if(!voteStarted) return;
        let alive = currentGame.playersSnapshot.filter(p=>p.alive);
        let votedCount = Object.keys(currentGame.playerVotes).length;
        document.getElementById('vote-status').innerHTML = `✅ Oy verenler: ${votedCount}/${alive.length}`;
        if(!hasVoted) {
            let candidates = alive.filter(p=>p.name !== myName);
            document.getElementById('vote-options').innerHTML = candidates.map(p=>`<div class="vote-item" onclick="submitVote('${p.name}')">🔸 ${p.name}</div>`).join('');
            if(voteTimer) clearInterval(voteTimer);
            let tl = 12;
            let td = document.getElementById('vote-timer');
            td.innerText = tl;
            voteTimer = setInterval(() => {
                if(!hasVoted && voteStarted) {
                    tl--;
                    td.innerText = tl;
                    if(tl <= 0) {
                        clearInterval(voteTimer);
                        submitVote('PAS');
                    }
                }
            }, 1000);
        } else {
            document.getElementById('vote-options').innerHTML = `<div style="text-align:center; padding:20px;">✅ Oy kullandınız. Bekleyin...</div>`;
            if(voteTimer) clearInterval(voteTimer);
            document.getElementById('vote-timer').innerText = "---";
        }
    }

    function submitVote(target) {
        if(hasVoted || !voteStarted) return;
        if(voteTimer) clearInterval(voteTimer);
        hasVoted = true;
        if(target === 'PAS') {
            currentGame.playerVotes[myName] = 'PAS';
        } else {
            currentGame.votes[target] = (currentGame.votes[target] || 0) + 1;
            currentGame.playerVotes[myName] = target;
        }
        renderVoteUI();
        let alive = currentGame.playersSnapshot.filter(p=>p.alive);
        if(Object.keys(currentGame.playerVotes).length >= alive.length) {
            calculateResults();
        }
    }

    function calculateResults() {
        if(!isHost) return;
        voteStarted = false;
        if(voteTimer) clearInterval(voteTimer);
        let alive = currentGame.playersSnapshot.filter(p=>p.alive);
        let voteMap = {};
        for(let p of alive) {
            let v = currentGame.playerVotes[p.name];
            if(v && v !== 'PAS') voteMap[v] = (voteMap[v] || 0) + 1;
        }
        let sorted = Object.entries(voteMap).sort((a,b)=>b[1]-a[1]);
        let isDraw = sorted.length > 1 && sorted[0][1] === sorted[1][1];
        let resultText = "", resultTitle = "";
        if(sorted.length === 0 || isDraw) {
            resultTitle = "🕵️ BERABERLİK! KÖSTEBEK KAZANDI!";
            currentGame.spyNames.forEach(spy => {
                let idx = currentGame.playersSnapshot.findIndex(pp=>pp.name===spy);
                if(idx !== -1) currentGame.playersSnapshot[idx].score += 1;
                let oidx = players.findIndex(pp=>pp.name===spy);
                if(oidx !== -1) players[oidx].score += 1;
            });
            resultText = "Oylama berabere. Köstebekler +1 puan.";
        } else {
            let target = sorted[0][0];
            let targetPlayer = currentGame.playersSnapshot.find(p=>p.name===target);
            let isSpy = currentGame.spyNames.includes(target);
            if(isSpy) {
                resultTitle = "🎯 DOĞRU TAHMİN!";
                targetPlayer.alive = false;
                let bilenler = [];
                for(let p of currentGame.playersSnapshot) {
                    if(p.alive && !currentGame.spyNames.includes(p.name) && currentGame.playerVotes[p.name] === target) {
                        let idx = currentGame.playersSnapshot.findIndex(pp=>pp.name===p.name);
                        if(idx !== -1) currentGame.playersSnapshot[idx].score += 1;
                        let oidx = players.findIndex(pp=>pp.name===p.name);
                        if(oidx !== -1) players[oidx].score += 1;
                        bilenler.push(p.name);
                    }
                }
                resultText = `<b>${target}</b> köstebekti! ✅ Bilenler: ${bilenler.length ? bilenler.join(', ') : 'Kimse bilemedi'}`;
            } else {
                resultTitle = "❌ YANLIŞ KİŞİ!";
                targetPlayer.alive = false;
                currentGame.spyNames.forEach(spy => {
                    let idx = currentGame.playersSnapshot.findIndex(pp=>pp.name===spy);
                    if(idx !== -1) currentGame.playersSnapshot[idx].score += 1;
                    let oidx = players.findIndex(pp=>pp.name===spy);
                    if(oidx !== -1) players[oidx].score += 1;
                });
                resultText = `<b>${target}</b> masumdu. Köstebekler +1 puan.`;
            }
        }
        let gameEnded = (currentGame.currentRound >= currentGame.totalRounds);
        let resultData = { title: resultTitle, body: resultText, gameEnded, currentRound: currentGame.currentRound, totalRounds: currentGame.totalRounds };
        showResultScreen(resultData);
    }

    function showResultScreen(data) {
        document.getElementById('screen-vote').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');
        document.getElementById('result-title').innerText = data.title;
        let nextInfo = data.gameEnded ? "🏆 TÜM TURLAR TAMAMLANDI! 🏆" : `📌 Kelime ${data.currentRound}/${data.totalRounds} tamamlandı.`;
        document.getElementById('result-body').innerHTML = `<div>${data.body}</div><div>${nextInfo}</div>`;
        let sorted = [...players].sort((a,b)=>b.score - a.score);
        let sh = "<div>🏆 GÜNCEL PUAN DURUMU 🏆</div>";
        sorted.forEach((p,idx) => {
            let medal = idx===0?"🥇": idx===1?"🥈": idx===2?"🥉":"📌";
            sh += `<div>${medal} ${p.name} — 🎯 ${p.score}</div>`;
        });
        document.getElementById('result-scoreboard').innerHTML = sh;
        if(data.gameEnded) {
            document.getElementById('next-round-btn-area').classList.add('hidden');
        } else {
            if(isHost) document.getElementById('next-round-btn-area').classList.remove('hidden');
            else {
                document.getElementById('next-round-btn-area').classList.add('hidden');
                document.getElementById('result-body').innerHTML += `<div>⏳ Liderin sonraki kelimeye geçmesini bekleyin...</div>`;
            }
        }
        voteStarted = false;
    }

    function nextRound() {
        if(!isHost) return;
        if(currentGame.currentRound < currentGame.totalRounds) {
            currentGame.currentRound++;
            startNewRound();
        } else {
            showFinalGameResults();
        }
    }

    function startNewRound() {
        let pairIndex = Math.floor(Math.random() * fullHavuz.length);
        let pair = fullHavuz[pairIndex];
        let mCount = players.length >=7 ? 2 : 1;
        let shuffled = [...players];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        let spyNames = [];
        for(let i=0;i<mCount;i++) spyNames.push(shuffled[i].name);
        for(let p of players) {
            let isSpy = spyNames.includes(p.name);
            p.word = isSpy ? (currentGame.mode==='katil' ? "???" : pair[1]) : pair[0];
            if(p.name === myName) myAssignedWord = p.word;
        }
        currentGame = { mode: currentGame.mode, spyNames, pair, playersSnapshot: JSON.parse(JSON.stringify(players)), votes: {}, playerVotes: {}, currentRound: currentGame.currentRound, totalRounds: currentGame.totalRounds };
        leaderConfirmed = false;
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-reveal').classList.remove('hidden');
        document.getElementById('my-reveal-word').innerText = "???";
        document.getElementById('my-reveal-word').classList.add('hidden');
        document.getElementById('revealBtn').classList.remove('hidden');
        document.getElementById('changeBtn').classList.remove('hidden');
        document.getElementById('approveBtn').classList.add('hidden');
        document.getElementById('waiting-message').classList.add('hidden');
    }

    function showFinalGameResults() {
        let sorted = [...players].sort((a,b)=>b.score - a.score);
        let html = "<h3>🏆 FİNAL SIRALAMASI 🏆</h3>";
        sorted.forEach((p,idx) => {
            let medal = idx===0?"🥇": idx===1?"🥈": idx===2?"🥉":"📌";
            html += `<div>${medal} ${p.name} — 🎯 ${p.score} puan</div>`;
        });
        document.getElementById('result-body').innerHTML = html;
        document.getElementById('result-title').innerText = "🎉 OYUN BİTTİ 🎉";
        document.getElementById('next-round-btn-area').classList.add('hidden');
        document.getElementById('result-scoreboard').innerHTML = "";
        let btn = document.createElement('button');
        btn.innerText = "🏠 LOBİYE DÖN";
        btn.className = "btn btn-main";
        btn.onclick = () => resetToLobby();
        document.getElementById('result-body').appendChild(btn);
    }

    function resetToLobby() {
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-vote').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('screen-reveal').classList.add('hidden');
        document.getElementById('screen-lobby').classList.remove('hidden');
        renderLobby();
        if(isHost) document.getElementById('host-controls').classList.remove('hidden');
        voteStarted = false;
        hasVoted = false;
        if(voteTimer) clearInterval(voteTimer);
    }
</script>
</body>
</html>
