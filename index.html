        *{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:#000;color:#fff;font-family:-apple-system,sans-serif;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .container{width:95%;max-width:460px;background:#111;border:2px solid #222;border-radius:35px;padding:20px 16px;text-align:center}
        .btn{width:100%;padding:14px;margin:8px 0;border-radius:28px;border:none;font-weight:bold;cursor:pointer}
        .btn-main{background:#fff;color:#000}
        .btn-gafil{background:#ffd700;color:#000}
        .btn-katil{background:#ff4d4d;color:#fff}
        .btn-exit{background:#330000;color:#ff8888;border:1px solid #800}
        .btn-chat{background:#2e7d32;color:#fff}
        .btn-whatsapp{background:#25D366;color:#fff}
        .btn-reset{background:#8b0000;color:#fff;border:1px solid #ff4444}
        input{width:100%;padding:14px;margin:8px 0;border-radius:28px;background:#1a1a1a;color:#fff;border:1px solid #333;text-align:center}
        .player-card{background:#151515;padding:12px;margin:8px 0;border-radius:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .word-box{background:#0f0f0f;border:3px dashed #555;padding:40px 10px;font-size:2.2em;margin:20px 0;border-radius:28px;color:#ffd700}
        .vote-item{background:#1a1a1a;padding:14px;margin:8px 0;border-radius:50px;border:1px solid #333;cursor:pointer}
        .hidden{display:none !important}
        #vote-timer,#timer-display{font-size:2.5em;color:#ff4d4d;margin:10px auto;background:#1a0000;border-radius:60px;width:100px;padding:10px}
        .reveal-word-box{background:#0f0f0f;border:2px solid #ffd700;padding:20px;font-size:1.8em;margin:15px 0;border-radius:20px}
        .copy-area{display:flex;gap:8px;background:#0a0a0a;padding:5px 10px;border-radius:40px;margin-bottom:10px}
        .copy-area input{flex:1;background:transparent;border:none;color:#ffd700;font-size:0.6em;padding:8px 0;margin:0;text-align:left}
        .copy-btn{background:#ffd700;color:#000;border:none;border-radius:30px;padding:6px 12px;cursor:pointer}
        .rule-box{background:#1a1a1a;border-radius:20px;padding:10px;margin:15px 0 5px;font-size:0.7em;text-align:left;color:#ccc;border:1px solid #333}
        .speaker-indicator{background:#2e7d32;color:#fff;padding:4px 10px;border-radius:20px;font-size:0.7em;display:inline-block;margin-left:8px}
        .sub{color:#888;font-size:0.6em;margin-top:-5px;margin-bottom:10px}
        .mic-toggle{background:#444;border:none;color:white;padding:5px 12px;border-radius:30px;font-size:0.7em;cursor:pointer;margin-left:8px}

    <div id="screen-lobby">

    <div id="screen-reveal" class="hidden">

    <div id="screen-game" class="hidden">

        <div class="word-box" id="game-word-box">---</div>
        <div id="discussion-area" class="hidden">

            <div id="timer-display">30</div>
            <div id="leader-next-speaker-area" class="hidden"><button class="btn btn-main" onclick="nextSpeaker()">⏩ SÖZÜ DEVRET</button></div>
        </div>
        <div id="host-action" class="hidden"><button class="btn btn-gafil" onclick="startDiscussion()">🎙️ TARTIŞMAYI BAŞLAT</button></div>
    </div>

    <div id="screen-vote" class="hidden">
        <h3>🗳️ KİM KÖSTEBEK?</h3>
        <div id="vote-options"></div>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="result-title">---</h1>
        <div id="result-body"></div>
        <div id="next-round-btn-area" class="hidden"><button id="actionBtn" class="btn btn-main">DEVAM ET</button></div>
    </div>
</div>

async function initMicrophone() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        toggleLocalMic(myMicEnabled);
    } catch(e) { console.log("Mic Hatası"); }
}

function toggleLocalMic(enable) {
    if(localStream) {
        localStream.getAudioTracks().forEach(t => t.enabled = enable);
        myMicEnabled = enable;
    }
}

function odaKur() {
    myName = document.getElementById('nameInput').value.trim();
    if(!myName) return;
    isHost = true;
    myId = "KST-"+Math.random().toString(36).substr(2,6).toUpperCase();
    peer = new Peer(myId);
    peer.on('connection', c => {
        connections[c.peer] = c;
        c.on('data', d => handleDataMessage(d, c));
    });
    peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', stream => handleRemoteStream(stream, call.peer));
    });
    initMicrophone().then(() => {
        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('lobby-area').classList.remove('hidden');
        document.getElementById('host-controls').classList.remove('hidden');
        document.getElementById('share-link').value = window.location.href.split('?')[0] + "?join=" + myId;
        players = [{ name: myName, score: 0, alive: true, peerId: myId, word: "" }];
        renderLobby();
    });
}

function odayaKatil(id) {
    myName = document.getElementById('nameInput').value.trim();
    if(!myName) return;
    peer = new Peer();
    peer.on('open', (myPeerId) => {
        liderBaglantisi = peer.connect(id);
        liderBaglantisi.on('open', () => {
            liderBaglantisi.send({ type: 'join', name: myName, peerId: myPeerId });
            initMicrophone().then(() => {
                peer.call(id, localStream);
                document.getElementById('setup-area').classList.add('hidden');
                document.getElementById('lobby-area').classList.remove('hidden');
            });
        });
        liderBaglantisi.on('data', d => handleDataMessage(d, liderBaglantisi));
    });
    peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', stream => handleRemoteStream(stream, call.peer));
    });
}

function handleRemoteStream(stream, peerId) {
    let audio = document.createElement('audio');
    audio.srcObject = stream;
    audio.play();
}

function handleDataMessage(d, conn) {
    if(d.type === 'join' && isHost) {
        players.push({ name: d.name, score: 0, alive: true, peerId: d.peerId, word: "" });
        broadcast({ type: 'sync', players });
        renderLobby();
    }
    else if(d.type === 'sync') { players = d.players; renderLobby(); }
    else if(d.type === 'start_game') { 
        currentGame = d.gameData;
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-reveal').classList.remove('hidden');
    }
    else if(d.type === 'game_started') {
        document.getElementById('screen-reveal').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
    }
    else if(d.type === 'disc_start') {
        document.getElementById('discussion-area').classList.remove('hidden');
        document.getElementById('speaker-name').innerText = `🎤 ${d.speakerName} KONUŞUYOR`;
    }
    else if(d.type === 'vote_start') startVotingPhase();
    else if(d.type === 'vote_submit' && isHost) handleVoteSubmission(d.voter, d.target);
    else if(d.type === 'result_sync') showResultScreen(d.resultData);
}

function broadcast(data) { if(isHost) Object.values(connections).forEach(c=>c.send(data)); }

function renderLobby() {
    const list = document.getElementById('player-list');
    list.innerHTML = players.map(p => `<div class="player-card">👤 <b>${p.name}</b> - Puan: ${p.score}</div>`).join('');
    document.getElementById('lobby-count').innerText = players.length;
}

function oyunuBaslat(mode) {
    let pair = kelimeHavuzu[Math.floor(Math.random()*kelimeHavuzu.length)];
    let spyWord = pair[Math.floor(Math.random()*2)];
    let civilWord = (spyWord === pair[0]) ? pair[1] : pair[0];
    let spyCount = players.length >= 7 ? 2 : 1;
    let shuffled = [...players].sort(() => Math.random() - 0.5);
    let spyNames = shuffled.slice(0, spyCount).map(p => p.name);
    
    players.forEach(p => {
        p.alive = true;
        p.word = spyNames.includes(p.name) ? spyWord : civilWord;
    });

    currentGame = { mode, spyNames, playersSnapshot: JSON.parse(JSON.stringify(players)), playerVotes: {}, currentRound: 1, discussionOrder: players.map(p=>p.name).sort(()=>Math.random()-0.5) };
    broadcast({ type: 'start_game', gameData: currentGame });
    document.getElementById('screen-lobby').classList.add('hidden');
    document.getElementById('screen-reveal').classList.remove('hidden');
    if(isHost) document.getElementById('approveBtn').classList.remove('hidden');
}

function revealMyWord() {
    let me = players.find(p => p.name === myName);
    document.getElementById('my-reveal-word').innerText = me.word;
}

function approveAndStartGame() {
    broadcast({ type: 'game_started' });
    document.getElementById('screen-reveal').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    if(isHost) document.getElementById('host-action').classList.remove('hidden');
}

function startDiscussion() {
    currentSpeakerIdx = 0;
    sendSpeakerData();
    document.getElementById('host-action').classList.add('hidden');
    document.getElementById('discussion-area').classList.remove('hidden');
    if(isHost) document.getElementById('leader-next-speaker-area').classList.remove('hidden');
}

function sendSpeakerData() {
    let name = currentGame.discussionOrder[currentSpeakerIdx];
    broadcast({ type: 'disc_start', speakerName: name });
    document.getElementById('speaker-name').innerText = `🎤 ${name} KONUŞUYOR`;
}

function nextSpeaker() {
    currentSpeakerIdx++;
    if(currentSpeakerIdx < currentGame.discussionOrder.length) sendSpeakerData();
    else { broadcast({ type: 'vote_start' }); startVotingPhase(); }
}

function startVotingPhase() {
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-vote').classList.remove('hidden');
    let candidates = players.filter(p => p.alive && p.name !== myName);
    document.getElementById('vote-options').innerHTML = candidates.map(p => `<div class="vote-item" onclick="submitVote('${p.name}')">${p.name}</div>`).join('');
}

function submitVote(target) {
    if(hasVoted) return;
    hasVoted = true;
    if(isHost) handleVoteSubmission(myName, target);
    else liderBaglantisi.send({ type: 'vote_submit', voter: myName, target });
}

function handleVoteSubmission(voter, target) {
    currentGame.playerVotes[voter] = target;
    let aliveCount = players.filter(p => p.alive).length;
    if(Object.keys(currentGame.playerVotes).length >= aliveCount) calculateResults();
}

function calculateResults() {
    let v = currentGame.playerVotes, counts = {};
    for(let name in v) counts[v[name]] = (counts[v[name]] || 0) + 1;
    let sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    let target = sorted[0][0];
    let targetP = players.find(p => p.name === target);
    if(targetP) targetP.alive = false;
    let isSpy = targetP && currentGame.spyNames.includes(target);
    let resData = { title: isSpy ? "KÖSTEBEK ELENDİ" : "SİVİL ELENDİ", body: `${target} elendi. Kelimesi: ${targetP.word}` };
    broadcast({ type: 'result_sync', resultData: resData });
    showResultScreen(resData);
}

function showResultScreen(data) {
    document.getElementById('screen-vote').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    document.getElementById('result-title').innerText = data.title;
    document.getElementById('result-body').innerText = data.body;
}

function kopyalaLink() { let c = document.getElementById('share-link'); c.select(); document.execCommand('copy'); alert("Kopyalandı!"); }

const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('join')) {
    document.querySelector('.btn-main').onclick = () => odayaKatil(urlParams.get('join'));
}
